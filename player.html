<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StreamHub Player</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Bebas+Neue&display=swap');

:root{
  --bg:#0b0b12;
  --card:#161622;
  --border:rgba(255,255,255,0.08);
  --accent:#ff3d5a;
  --text:#f5f5ff;
  --muted:#9c9cb3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Bebas Neue';
  font-size:1.5rem;
  color:var(--accent);
}

/* TOP AD (ONLY PLACE) */
#top-ad{
  display:flex;
  justify-content:center;
  margin:15px 0;
}

.ad-placeholder{
  width:728px;
  max-width:100%;
  height:90px;
  border:1px dashed var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:0.85rem;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:1rem;
}

/* PLAYER */
.player{
  background:black;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  position:relative;
}

video{
  width:100%;
  max-height:65vh;
}

/* LOADER */
.loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
}

.spinner{
  width:40px;
  height:40px;
  border:3px solid #333;
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* INFO */
.title{
  font-size:1.3rem;
  font-weight:800;
  margin-top:1rem;
}

.desc{
  margin-top:.6rem;
  background:var(--card);
  padding:1rem;
  border-radius:10px;
  border:1px solid var(--border);
  color:var(--muted);
}

/* BUTTONS */
.actions{
  margin-top:.7rem;
  display:flex;
  gap:.5rem;
}

.btn{
  padding:.5rem .9rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
}

.btn:hover{
  background:#202030;
}

/* RELATED */
.related{
  margin-top:2rem;
}

.rel-item{
  display:flex;
  gap:.7rem;
  padding:.5rem;
  border-radius:8px;
  cursor:pointer;
}

.rel-item:hover{
  background:var(--card);
}

.thumb{
  width:100px;
  height:60px;
  background:var(--card);
  border-radius:6px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">StreamHub</div>
</nav>

<!-- ✅ ONLY AD PLACE -->
<div id="top-ad">
  <div class="ad-placeholder">
    TOP BANNER AD (728x90) — Paste your ad code here later
  </div>
</div>

<div class="container">

  <!-- PLAYER -->
  <div class="player">
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <video id="vid" controls preload="metadata" crossorigin="anonymous"></video>
  </div>

  <!-- INFO -->
  <div class="title" id="title">Loading...</div>

  <div class="actions">
    <button class="btn" onclick="like()">Like</button>
    <button class="btn" onclick="share()">Share</button>
  </div>

  <div class="desc" id="desc">No description</div>

  <!-- RELATED -->
  <div class="related">
    <h3>Up Next</h3>
    <div id="related"></div>
  </div>

</div>

<script>
const P = new URLSearchParams(location.search);

const VID = {
  id: P.get('id'),
  title: P.get('title'),
  url: P.get('url'),
  desc: P.get('ds')
};

const video = document.getElementById('vid');
const loader = document.getElementById('loader');

document.getElementById('title').textContent = VID.title || "Untitled";
document.getElementById('desc').textContent = VID.desc || "No description";

/* VIDEO LOAD */
if (VID.url) {
  video.src = VID.url;
}

/* EVENTS */
video.addEventListener('loadeddata', () => {
  loader.style.display = 'none';
});

video.addEventListener('waiting', () => {
  loader.style.display = 'flex';
});

video.addEventListener('playing', () => {
  loader.style.display = 'none';
});

video.addEventListener('error', () => {
  loader.innerHTML = "<p style='color:white'>Failed to load video</p>";
});

/* LIKE */
function like(){
  alert("Liked!");
}

/* SHARE */
function share(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
}

/* RELATED */
let all = JSON.parse(localStorage.getItem('sh_v') || '[]');

let rel = all.filter(v => v.id !== VID.id).slice(0,5);

document.getElementById('related').innerHTML = rel.map(v=>`
  <div class="rel-item" onclick="go('${v.id}')">
    <div class="thumb"></div>
    <div>${v.title}</div>
  </div>
`).join('');

function go(id){
  let v = all.find(x=>x.id==id);
  location.href = 'player.html?id='+v.id+'&title='+encodeURIComponent(v.title)+'&url='+encodeURIComponent(v.url);
}
</script>

</body>
</html>
