<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="v-page-title">StreamHub | Core</title>

    <!-- ✅ NATIVE AD SCRIPT (ONLY ONCE) -->
    <script async="async" data-cfasync="false"
    src="https://pl28972109.profitablecpmratenetwork.com/c1df7fbc6e920a6327e3382850f6ae9f/invoke.js"></script>

    <style>
        :root {
            --bg: #050507;
            --surface: #0f0f13;
            --accent: #ff4d4d;
            --border: #1e1e24;
            --text-p: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -1.5px;
        }

        .master-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }

        video { width: 100%; height: 100%; display: block; }

        /* ✅ Native Ad Styling */
        .native-ad {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
        }

        .info-stack { margin-top: 2rem; }

        .tag {
            background: rgba(255, 77, 77, 0.15);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        h1 { font-size: 2.5rem; margin: 1rem 0; }

        .metadata-line {
            display: flex;
            gap: 1.5rem;
            color: var(--text-p);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .description-box {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            line-height: 1.6;
            color: #cbd5e1;
        }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

        .panel {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        @media (max-width: 1000px) {
            .master-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<nav>
    <a href="/" class="logo">STREAMHUB</a>
    <button style="background:var(--accent); border:none; color:#fff; padding:0.7rem 1.5rem; border-radius:8px; font-weight:700; cursor:pointer;">BACK TO HOME</button>
</nav>

<div class="master-grid">
    <main>

        <div class="viewport">
            <video id="v-engine" controls autoplay>
                <source src="" type="video/mp4">
            </video>
        </div>

        <!-- ✅ SINGLE NATIVE AD (BEST POSITION) -->
        <div class="native-ad">
            <div id="container-c1df7fbc6e920a6327e3382850f6ae9f"></div>
        </div>

        <div class="info-stack">
            <span class="tag" id="v-category">General</span>
            <h1 id="v-title">Initializing Stream...</h1>

            <div class="metadata-line">
                <span>⭐ <span id="v-rating">0.0</span></span>
                <span>📅 <span id="v-year">2026</span></span>
                <span>4K UHD</span>
            </div>

            <div class="description-box" id="v-description">
                Extracting data from source...
            </div>
        </div>

    </main>

    <aside class="sidebar">
        <div class="panel">
            <h3>Controls</h3>
            <div>Play/Pause — Space</div>
            <div>Forward — →</div>
            <div>Backward — ←</div>
            <div>Fullscreen — F</div>
        </div>
    </aside>
</div>

<script>
(function() {
    const query = new URLSearchParams(window.location.search);

    const domMap = {
        'url': (v) => document.getElementById('v-engine').src = decodeURIComponent(v),
        'title': (v) => {
            const t = decodeURIComponent(v);
            document.getElementById('v-title').innerText = t;
            document.getElementById('v-page-title').innerText = t + " | StreamHub";
        },
        'ds': (v) => document.getElementById('v-description').innerText = decodeURIComponent(v),
        'cat': (v) => document.getElementById('v-category').innerText = v,
        'yr': (v) => document.getElementById('v-year').innerText = v,
        'rt': (v) => document.getElementById('v-rating').innerText = v
    };

    Object.entries(domMap).forEach(([k, fn]) => {
        const val = query.get(k);
        if (val) fn(val);
    });
})();
</script>

</body>
</html>
