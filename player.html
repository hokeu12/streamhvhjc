<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Player</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

/* TOP AD */
.ad-top{
    width:100%;
    min-height:60px;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:14px;
    color:#aaa;
}

/* VIDEO WRAPPER */
.container{
    padding:10px;
}

video{
    width:100%;
    border-radius:10px;
    background:black;
}

/* TITLE */
.title{
    margin:10px 0;
    font-size:18px;
    font-weight:bold;
}

/* BOTTOM AD */
.ad-bottom{
    margin-top:15px;
    width:100%;
    min-height:80px;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:14px;
    color:#aaa;
}
</style>
</head>

<body>

<!-- 🔝 AD SLOT 1 -->
<div class="ad-top">
    Your Ad Here (<script>
  atOptions = {
    'key' : '3407cae831ba7308f892ce3e722d876e',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/3407cae831ba7308f892ce3e722d876e/invoke.js"></script>
)
</div>

<div class="container">

    <!-- VIDEO TITLE -->
    <div class="title" id="videoTitle">Loading Video...</div>

    <!-- VIDEO PLAYER -->
    <video id="videoPlayer" controls autoplay>
        <source id="videoSource" src="" type="video/mp4">
        Your browser does not support video tag.
    </video>

    <!-- 🔻 AD SLOT 2 -->
    <div class="ad-bottom">
        Your Ad Here (Bottom Banner)
    </div>

</div>

<script>
// Get video from URL
const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("video");
const title = params.get("title");

const videoPlayer = document.getElementById("videoPlayer");
const videoSource = document.getElementById("videoSource");
const videoTitle = document.getElementById("videoTitle");

if(videoUrl){
    videoSource.src = videoUrl;
    videoPlayer.load();
}

if(title){
    videoTitle.innerText = title;
} else {
    videoTitle.innerText = "Now Playing";
}
</script>

</body>
</html>
