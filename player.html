<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="v-page-title">StreamHub | Core</title>
    <style>
        /* Global Reset & Core Variables */
        :root {
            --bg: #050507;
            --surface: #0f0f13;
            --accent: #ff4d4d;
            --border: #1e1e24;
            --text-p: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Pure Navigation - Removed all Ad hooks */
        nav {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -1.5px;
        }

        /* 499 IQ Layout: Responsive Matrix */
        .master-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* Video Stage */
        .viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }

        video { width: 100%; height: 100%; display: block; }

        /* Meta Injection Area */
        .info-stack { margin-top: 2rem; }
        .tag {
            background: rgba(255, 77, 77, 0.15);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        h1 { font-size: 2.5rem; margin: 1rem 0; letter-spacing: -1px; }

        .metadata-line {
            display: flex;
            gap: 1.5rem;
            color: var(--text-p);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .description-box {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            line-height: 1.6;
            color: #cbd5e1;
        }

        /* Sidebar - Stripped of all Ad IDs */
        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        
        .panel {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .panel h3 {
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            margin: 0 0 1rem;
            letter-spacing: 1px;
        }

        .shortcut {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        kbd {
            background: #1e1e24;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid #334155;
        }

        /* Mobile Breakpoint */
        @media (max-width: 1000px) {
            .master-grid { grid-template-columns: 1fr; }
            .sidebar { order: 2; }
        }

        /* Nuclear Option: CSS overwrite to hide any injected ad content */
        [id*="ad"], [class*="ad-"], [class*="banner"], iframe:not(video iframe) {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">STREAMHUB</a>
        <button style="background:var(--accent); border:none; color:#fff; padding:0.7rem 1.5rem; border-radius:8px; font-weight:700; cursor:pointer;">BACK TO HOME</button>
    </nav>

    <div class="master-grid">
        <main>
            <div class="viewport">
                <video id="v-engine" controls autoplay>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="info-stack">
                <span class="tag" id="v-category">General</span>
                <h1 id="v-title">Initializing Stream...</h1>
                <div class="metadata-line">
                    <span>⭐ <span id="v-rating">0.0</span></span>
                    <span>📅 <span id="v-year">2026</span></span>
                    <span>4K UHD</span>
                </div>
                <div class="description-box" id="v-description">
                    Extracting data from source...
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="panel">
                <h3>Controls</h3>
                <div class="shortcut"><span>Play/Pause</span> <kbd>Space</kbd></div>
                <div class="shortcut"><span>Forward</span> <kbd>→</kbd></div>
                <div class="shortcut"><span>Backward</span> <kbd>←</kbd></div>
                <div class="shortcut"><span>Fullscreen</span> <kbd>F</kbd></div>
            </div>
            
            <div class="panel" style="text-align:center;">
                <h3>Status</h3>
                <p style="font-size: 0.8rem; color: #475569;">Stream encrypted & Ad-Free</p>
            </div>
        </aside>
    </div>

    <script>
        /**
         * 499 IQ Dynamic Data Injection
         * Maps URL parameters to DOM with zero delay.
         */
        (function() {
            const query = new URLSearchParams(window.location.search);
            const domMap = {
                'url': (v) => document.getElementById('v-engine').src = decodeURIComponent(v),
                'title': (v) => {
                    const cleanTitle = decodeURIComponent(v);
                    document.getElementById('v-title').innerText = cleanTitle;
                    document.getElementById('v-page-title').innerText = cleanTitle + " | StreamHub";
                },
                'ds': (v) => document.getElementById('v-description').innerText = decodeURIComponent(v),
                'cat': (v) => document.getElementById('v-category').innerText = v,
                'yr': (v) => document.getElementById('v-year').innerText = v,
                'rt': (v) => document.getElementById('v-rating').innerText = v
            };

            Object.entries(domMap).forEach(([key, action]) => {
                const value = query.get(key);
                if (value) action(value);
            });
        })();
    </script>
</body>
</html>
