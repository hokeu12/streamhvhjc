<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StreamHub Player</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Bebas+Neue&display=swap');

:root{
  --bg:#0b0b12;
  --card:#161622;
  --border:rgba(255,255,255,0.08);
  --accent:#ff3d5a;
  --text:#f5f5ff;
  --muted:#9c9cb3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
}

nav{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Bebas Neue';
  font-size:1.5rem;
  color:var(--accent);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:1rem;
}

.player{
  background:black;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  position:relative;
}

video{
  width:100%;
  max-height:65vh;
}

.native-ad{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

.loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
}

.spinner{
  width:40px;
  height:40px;
  border:3px solid #333;
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.title{
  font-size:1.3rem;
  font-weight:800;
  margin-top:1rem;
}

.desc{
  margin-top:.6rem;
  background:var(--card);
  padding:1rem;
  border-radius:10px;
  border:1px solid var(--border);
  color:var(--muted);
}

.actions{
  margin-top:.7rem;
  display:flex;
  gap:.5rem;
}

.btn{
  padding:.5rem .9rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
}

.related{
  margin-top:2rem;
}
</style>
</head>

<body>

<nav>
  <div class="logo">StreamHub</div>
</nav>

<div class="container">

  <!-- 🔥 TOP NATIVE AD (BEST POSITION) -->
  <div class="native-ad">
    <script async data-cfasync="false"
      src="https://pl28972109.profitablecpmratenetwork.com/c1df7fbc6e920a6327e3382850f6ae9f/invoke.js">
    </script>
    <div id="container-c1df7fbc6e920a6327e3382850f6ae9f"></div>
  </div>

  <!-- PLAYER -->
  <div class="player">
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <video id="vid" controls preload="metadata"></video>
  </div>

  <!-- 🔥 SECOND NATIVE AD -->
  <div class="native-ad">
    <script async data-cfasync="false"
      src="https://pl28972109.profitablecpmratenetwork.com/c1df7fbc6e920a6327e3382850f6ae9f/invoke.js">
    </script>
    <!-- ⚠️ UNIQUE ID REQUIRED -->
    <div id="container-c1df7fbc6e920a6327e3382850f6ae9f-2"></div>
  </div>

  <div class="title" id="title">Loading...</div>

  <div class="actions">
    <button class="btn" onclick="like()">Like</button>
    <button class="btn" onclick="share()">Share</button>
  </div>

  <div class="desc" id="desc">No description</div>

  <div class="related">
    <h3>Up Next</h3>
    <div id="related"></div>
  </div>

</div>

<script>
const P = new URLSearchParams(location.search);

const VID = {
  id: P.get('id'),
  title: P.get('title'),
  url: P.get('url'),
  desc: P.get('ds')
};

const video = document.getElementById('vid');
const loader = document.getElementById('loader');

document.getElementById('title').textContent = VID.title || "Untitled";
document.getElementById('desc').textContent = VID.desc || "No description";

if (VID.url) video.src = VID.url;

video.addEventListener('loadeddata', ()=>loader.style.display='none');
video.addEventListener('waiting', ()=>loader.style.display='flex');
video.addEventListener('playing', ()=>loader.style.display='none');

video.addEventListener('error', ()=>{
  loader.innerHTML="<p style='color:white'>Failed to load</p>";
});

function like(){ alert("Liked!"); }

function share(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
}
</script>

<!-- ✅ SOCIAL BAR -->
<script src="https://pl28997809.profitablecpmratenetwork.com/b8/7d/81/b87d8149540da4612ff212f58c224f74.js"></script>

</body>
</html>
