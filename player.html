<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub Player</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Bebas+Neue&display=swap');

:root{
  --bg:#0a0a12;
  --card:#141420;
  --card2:#1c1c2a;
  --border:rgba(255,255,255,0.08);
  --accent:#ff3d5a;
  --text:#f5f5ff;
  --muted:#9c9cb3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 2rem;
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Bebas Neue';
  font-size:1.6rem;
  letter-spacing:.1em;
  color:var(--accent);
}

/* TOP AD */
#top-ad{
  display:flex;
  justify-content:center;
  margin:15px 0;
}

.ad-box{
  width:728px;
  height:90px;
  background:var(--card);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* PLAYER */
.container{
  max-width:1100px;
  margin:auto;
  padding:1.5rem;
}

.player{
  background:black;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  position:relative;
}

video{
  width:100%;
  max-height:65vh;
  background:black;
}

/* LOADER */
.loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:2;
}

.spinner{
  width:40px;
  height:40px;
  border:3px solid #333;
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* INFO */
.title{
  font-size:1.4rem;
  font-weight:800;
  margin-top:1rem;
}

.actions{
  margin-top:.7rem;
  display:flex;
  gap:.5rem;
}

.btn{
  background:var(--card2);
  border:1px solid var(--border);
  padding:.5rem .9rem;
  border-radius:8px;
  cursor:pointer;
}

.btn:hover{background:#22223a}

.desc{
  background:var(--card);
  padding:1rem;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:.8rem;
  color:var(--muted);
}

/* RELATED */
.related{
  margin-top:2rem;
}

.rel-item{
  display:flex;
  gap:.7rem;
  padding:.5rem;
  border-radius:8px;
  cursor:pointer;
}

.rel-item:hover{background:var(--card)}

.thumb{
  width:100px;
  height:60px;
  background:var(--card2);
  border-radius:6px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">StreamHub</div>
</nav>

<!-- ✅ TOP BANNER AD ONLY -->
<div id="top-ad">
  <div class="ad-box" id="ad-container">
    <!-- 🔥 PASTE YOUR AD SCRIPT BELOW -->
    <!-- Example (Adsterra / AdSense) -->
    <!--
    <script async src="YOUR_AD_SCRIPT.js"></script>
    -->
  </div>
</div>

<div class="container">

  <!-- PLAYER -->
  <div class="player">
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <video id="vid" controls preload="metadata"></video>
  </div>

  <!-- INFO -->
  <div class="title" id="title"></div>

  <div class="actions">
    <button class="btn" onclick="like()">Like</button>
    <button class="btn" onclick="share()">Share</button>
  </div>

  <div class="desc" id="desc"></div>

  <!-- RELATED -->
  <div class="related">
    <h3>Up Next</h3>
    <div id="related"></div>
  </div>

</div>

<script defer>
const P = new URLSearchParams(location.search);

const VID = {
  id: P.get('id'),
  title: P.get('title'),
  url: P.get('url'),
  desc: P.get('ds')
};

/* SET CONTENT */
document.getElementById('title').textContent = VID.title || "Untitled";
document.getElementById('desc').textContent = VID.desc || "No description";

/* VIDEO LAZY LOAD */
const video = document.getElementById('vid');
const loader = document.getElementById('loader');

if (VID.url) {
  setTimeout(() => {
    video.src = VID.url;
  }, 200); // delay = smoother UX
}

/* LOADING EVENTS */
video.addEventListener('canplay', () => {
  loader.style.display = 'none';
  video.play().catch(()=>{});
});

video.addEventListener('waiting', () => {
  loader.style.display = 'flex';
});

video.addEventListener('playing', () => {
  loader.style.display = 'none';
});

video.addEventListener('error', () => {
  loader.innerHTML = "<p style='color:white'>Video failed to load</p>";
});

/* LIKE */
function like(){
  alert("Liked!");
}

/* SHARE */
function share(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
}

/* RELATED */
let all = JSON.parse(localStorage.getItem('sh_v') || '[]');

let rel = all.filter(v => v.id !== VID.id).slice(0,5);

document.getElementById('related').innerHTML = rel.map(v=>`
  <div class="rel-item" onclick="go('${v.id}')">
    <div class="thumb"></div>
    <div>${v.title}</div>
  </div>
`).join('');

function go(id){
  let v = all.find(x=>x.id==id);
  location.href = 'player.html?id='+v.id+'&title='+encodeURIComponent(v.title)+'&url='+encodeURIComponent(v.url);
}
</script>

</body>
</html>
