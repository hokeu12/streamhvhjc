<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Video Player</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1a1a20;
            --text-main: #ffffff;
            --accent: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header Area */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Main Player Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .video-wrapper {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* Sidebar - No Ads, Just Info */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #2a2a32;
        }

        .shortcuts-list {
            list-style: none;
            padding: 0;
            font-size: 14px;
        }

        .shortcuts-list li {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            color: #aaa;
        }

        kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">StreamHub</div>
            <div class="nav-actions">
                <button>Like</button>
                <button>Share</button>
            </div>
        </header>

        <main class="main-content">
            <section class="video-section">
                <div class="video-wrapper">
                    <video controls poster="poster.jpg">
                        <source src="your-video-file.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </section>

            <aside class="sidebar">
                <div class="info-card">
                    <h3>Keyboard Shortcuts</h3>
                    <ul class="shortcuts-list">
                        <li>Play / Pause <kbd>Space</kbd></li>
                        <li>Forward 10s <kbd>→</kbd></li>
                        <li>Back 10s <kbd>←</kbd></li>
                        <li>Fullscreen <kbd>F</kbd></li>
                        <li>Mute <kbd>M</kbd></li>
                    </ul>
                </div>
                
                <div class="info-card">
                    <h3>Up Next</h3>
                    <p style="color:#666; font-size: 13px;">No related videos yet.</p>
                </div>
            </aside>
        </main>
    </div>

</body>
</html>
