<script>
// 🎬 VIDEO LOAD SYSTEM
const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("url");
const title = params.get("title");

const player = document.getElementById("player");

if(videoUrl){
  player.src = videoUrl;
} else {

}
