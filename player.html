<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">StreamHub - Player</title>
    <style>
        :root { --bg: #0b0b0e; --card: #16161d; --accent: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 26px; font-weight: bold; color: var(--accent); text-decoration: none; text-transform: uppercase; }

        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        
        .player-box { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; }

        .info { margin-top: 25px; }
        .badge { background: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .info h1 { margin: 10px 0; font-size: 32px; }
        .meta-row { display: flex; gap: 15px; color: #888; font-size: 14px; margin-bottom: 20px; }
        .desc-box { background: #121218; padding: 20px; border-radius: 8px; color: #bbb; line-height: 1.6; border: 1px solid #1f1f27; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #222; }
        .card h3 { margin: 0 0 15px 0; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; color: #ddd; }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; font-family: monospace; border: 1px solid #444; }

        @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="#" class="logo">STREAMHUB</a>
        <div style="display:flex; gap:10px;">
            <button style="background:#222; border:none; color:white; padding:8px 15px; border-radius:4px; cursor:pointer;">Like</button>
            <button style="background:#222; border:none; color:white; padding:8px 15px; border-radius:4px; cursor:pointer;">Share</button>
            <button style="background:var(--accent); border:none; color:white; padding:8px 15px; border-radius:4px; cursor:pointer;">All Videos</button>
        </div>
    </header>

    <div class="layout">
        <main>
            <div class="player-box">
                <video id="mainVideo" controls autoplay src=""></video>
            </div>

            <div class="info">
                <span class="badge" id="cat">MOVIES</span>
                <h1 id="title">Loading...</h1>
                <div class="meta-row">
                    <span>⭐ <span id="rate">0.0</span></span>
                    <span>📅 <span id="year">2000</span></span>
                    <span>HD</span>
                    <span>👁️ Watching now</span>
                </div>
                <div class="desc-box" id="desc">Loading description...</div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="card">
                <h3>Keyboard Shortcuts</h3>
                <div class="row"><span>Play / Pause</span> <kbd>Space</kbd></div>
                <div class="row"><span>Forward 10s</span> <kbd>→</kbd></div>
                <div class="row"><span>Back 10s</span> <kbd>←</kbd></div>
                <div class="row"><span>Fullscreen</span> <kbd>F</kbd></div>
                <div class="row"><span>Mute</span> <kbd>M</kbd></div>
            </div>
            <div class="card">
                <h3>Up Next</h3>
                <p style="font-size:12px; color:#444; text-align:center; margin:0;">No related videos yet.</p>
            </div>
        </aside>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    // Auto-load data from your URL
    if (params.get('url')) document.getElementById('mainVideo').src = decodeURIComponent(params.get('url'));
    if (params.get('title')) {
        const t = decodeURIComponent(params.get('title'));
        document.getElementById('title').innerText = t;
        document.getElementById('page-title').innerText = t + " - StreamHub";
    }
    if (params.get('ds')) document.getElementById('desc').innerText = decodeURIComponent(params.get('ds'));
    if (params.get('cat')) document.getElementById('cat').innerText = params.get('cat').toUpperCase();
    if (params.get('yr')) document.getElementById('year').innerText = params.get('yr');
    if (params.get('rt')) document.getElementById('rate').innerText = params.get('rt');
</script>

</body>
</html>
