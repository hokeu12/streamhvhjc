<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">StreamHub</title>

<style>
:root{
  --bg:#050507;
  --card:#0f0f13;
  --accent:#ff4d4d;
  --border:#1e1e24;
  --text:#94a3b8;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

video{
  width:100%;
  border-radius:12px;
  background:#000;
}

h1{margin:10px 0;}

.meta{color:var(--text);font-size:14px;}

.desc{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:15px;
}

/* SOCIAL BAR */
#social-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  border-top:1px solid #222;
  z-index:9999;
}

#social-bar a{
  background:var(--accent);
  padding:6px 12px;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
  font-weight:600;
}

#close-bar{
  position:absolute;
  right:10px;
  background:none;
  border:none;
  color:#aaa;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <video id="player" controls autoplay></video>

  <h1 id="title">Loading...</h1>
  <div class="meta">
    ⭐ <span id="rating">-</span> |
    📅 <span id="year">-</span> |
    🎬 <span id="category">-</span>
  </div>

  <div class="desc" id="desc">Loading description...</div>
</div>

<!-- SOCIAL BAR -->
<div id="social-bar" hidden>
  <span>🔥 Watch More:</span>
  <a href="https://your-link.com" target="_blank">Explore</a>
  <a href="https://your-link.com" target="_blank">Download</a>
  <button id="close-bar">✕</button>
</div>

<script>
const q = new URLSearchParams(location.search);

const video = document.getElementById('player');
const id = q.get('id');

function decode(v){ return decodeURIComponent(v || ""); }

// Load video
if(q.get('url')){
  video.src = decode(q.get('url'));
}

// Inject data
document.getElementById('title').innerText = decode(q.get('title')) || "Untitled";
document.getElementById('category').innerText = decode(q.get('cat')) || "-";
document.getElementById('year').innerText = decode(q.get('yr')) || "-";
document.getElementById('rating').innerText = decode(q.get('rt')) || "-";
document.getElementById('desc').innerText = decode(q.get('ds')) || "No description";

document.title = document.getElementById('title').innerText + " | StreamHub";

// Save progress
video.ontimeupdate = () => {
  if(!video.duration) return;
  const pct = Math.floor((video.currentTime / video.duration) * 100);
  localStorage.setItem("prog_"+id, pct);
};

// Resume
video.onloadedmetadata = () => {
  const saved = localStorage.getItem("prog_"+id);
  if(saved){
    video.currentTime = (saved/100) * video.duration;
  }
};

// Keyboard controls
document.addEventListener('keydown', e=>{
  if(e.key===" ") { e.preventDefault(); video.paused?video.play():video.pause(); }
  if(e.key==="ArrowRight") video.currentTime += 10;
  if(e.key==="ArrowLeft") video.currentTime -= 10;
  if(e.key==="f") video.requestFullscreen();
});

// SOCIAL BAR LOGIC
(function(){
  if(localStorage.getItem("sb_hide")) return;

  setTimeout(()=>{
    document.getElementById('social-bar').hidden = false;
  }, 5000);

  document.getElementById('close-bar').onclick = ()=>{
    document.getElementById('social-bar').remove();
    localStorage.setItem("sb_hide","1");
  };
})();
</script>

</body>
</html>
