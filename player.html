<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Player</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f0f13; /* Matching your dark theme */
            color: #ffffff;
            font-family: sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header / Logo Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            color: #ff4d4d;
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* Layout for Video + Sidebar */
        .player-layout {
            display: grid;
            grid-template-columns: 1fr 320px; /* Video takes primary space, sidebar is fixed */
            gap: 20px;
        }

        /* The Video Container */
        .video-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Sidebar UI */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: #1a1a20;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a32;
        }

        .card h3 {
            margin-top: 0;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
        }

        .shortcut-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
        }

        /* Responsive: Stack sidebar below video on mobile */
        @media (max-width: 900px) {
            .player-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">STREAMHUB</div>
            <div>
                <button style="background:#2a2a32; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">All Videos</button>
            </div>
        </div>

        <div class="player-layout">
            <div class="main-player">
                <div class="video-container">
                    <video controls>
                        <source src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <div class="sidebar">
                <div class="card">
                    <h3>Keyboard Shortcuts</h3>
                    <div class="shortcut-row"><span>Play / Pause</span> <kbd>Space</kbd></div>
                    <div class="shortcut-row"><span>Forward 10s</span> <kbd>→</kbd></div>
                    <div class="shortcut-row"><span>Back 10s</span> <kbd>←</kbd></div>
                    <div class="shortcut-row"><span>Fullscreen</span> <kbd>F</kbd></div>
                </div>

                <div class="card">
                    <h3>Up Next</h3>
                    <p style="color:#555; font-size: 12px;">No related videos yet.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
