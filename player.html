<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Watch — StreamHub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap');
:root{
  --bg:#09090f;--s1:#111119;--s2:#181824;--s3:#20212e;--s4:#28293a;
  --card:#141420;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --red:#e8293e;--red2:#ff4d62;--gold:#f5c518;--grn:#22c55e;--cyan:#22d3ee;
  --tx:#f2f1fc;--tx2:#c0bfd8;--mt:#7a7994;--dim:#2c2d42;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
button{font-family:'Nunito',sans-serif;cursor:pointer}

/* ── NAV ── */
#nav{height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;background:rgba(9,9,15,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:.1em;cursor:pointer;
  background:linear-gradient(135deg,var(--red),var(--red2),#ff8c55);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nbtn{display:flex;align-items:center;gap:.3rem;background:var(--s2);
  border:1px solid var(--bd2);color:var(--tx2);border-radius:8px;
  padding:.42rem .9rem;font-size:.78rem;font-weight:700;transition:all .18s}
.nbtn:hover{background:var(--s3);color:var(--tx)}
.nbtn.liked{color:var(--red);border-color:rgba(232,41,62,.4)}

/* ── TOP AD BANNER ── */
.p-ad{background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;min-height:90px;
  padding:.5rem;position:relative}
.ad-tag{position:absolute;top:4px;right:8px;font-size:.52rem;color:var(--dim);
  text-transform:uppercase;letter-spacing:.08em}
.ad-ph{width:100%;max-width:728px;min-height:90px;background:var(--s2);
  border:1px dashed var(--dim);border-radius:8px;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:.2rem}
.ad-ph b{font-size:.76rem;color:var(--mt);font-weight:600}
.ad-ph p{font-size:.62rem;color:var(--dim)}
.ad-ph-sm{width:300px;min-height:250px;background:var(--s2);border:1px dashed var(--dim);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.2rem}

/* ── PAGE LAYOUT ── */
#page{display:grid;grid-template-columns:1fr 320px;gap:0;max-width:1380px;margin:0 auto;padding:1.5rem 2rem}
#pleft{min-width:0}
#pright{padding-left:1.4rem;display:flex;flex-direction:column;gap:1.1rem}

/* ── VIDEO PLAYER ── */
.player-wrap{background:#000;border-radius:12px;overflow:hidden;
  border:1px solid var(--bd);margin-bottom:.9rem;position:relative}
#vid{width:100%;display:block;max-height:60vh;outline:none;background:#000}
.vloader{position:absolute;inset:0;background:#000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.8rem;
  transition:opacity .3s}
.vloader.gone{opacity:0;pointer-events:none}
.spin{width:38px;height:38px;border:3px solid var(--s3);border-top-color:var(--red);
  border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.vloader p{font-size:.78rem;color:var(--mt)}

/* ── BELOW VIDEO AD ── */
.p-ad-mid{background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  display:flex;align-items:center;justify-content:center;min-height:90px;
  padding:.5rem;position:relative;margin-bottom:1rem}

/* ── VIDEO INFO ── */
.vinfo{margin-bottom:1.1rem}
.vi-cat{display:inline-block;background:var(--red);color:#fff;font-size:.62rem;
  font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:.17rem .62rem;border-radius:5px;margin-bottom:.6rem}
.vi-title{font-size:clamp(1.2rem,2.8vw,1.75rem);font-weight:900;
  letter-spacing:-.02em;line-height:1.2;margin-bottom:.65rem}
.vi-meta{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:.85rem}
.chip{display:flex;align-items:center;gap:.22rem;background:var(--s2);
  border:1px solid var(--bd);border-radius:50px;padding:.2rem .62rem;
  font-size:.72rem;color:var(--mt)}
.vi-acts{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.9rem}
.vact{display:flex;align-items:center;gap:.3rem;background:var(--s2);
  border:1px solid var(--bd2);color:var(--tx);border-radius:8px;
  padding:.4rem .85rem;font-size:.76rem;font-weight:700;transition:all .18s}
.vact:hover{background:var(--s3);border-color:rgba(255,255,255,.2)}
.vact.liked{color:var(--red);border-color:rgba(232,41,62,.4)}
.vi-desc{background:var(--s1);border-radius:10px;padding:.95rem 1.05rem;
  font-size:.84rem;color:var(--mt);line-height:1.7;border:1px solid var(--bd)}

/* ── IN-CONTENT AD ── */
.p-ad-content{background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  display:flex;align-items:center;justify-content:center;min-height:250px;
  padding:.5rem;position:relative;margin-bottom:1.1rem}

/* ── AUTOPLAY NEXT ── */
.autonext{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;
  padding:.82rem 1rem;display:none;align-items:center;gap:.75rem;margin-bottom:.85rem}
.autonext.show{display:flex}
.an-prog{flex:1;height:3px;background:var(--bd);border-radius:2px}
.an-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .2s linear;width:100%}
.an-cancel{background:none;border:none;color:var(--mt);font-size:.74rem;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:color .18s;white-space:nowrap}
.an-cancel:hover{color:var(--tx)}

/* ── SIDEBAR ── */
.sside{position:sticky;top:70px;display:flex;flex-direction:column;gap:1rem}
.side-ad{position:relative;border-radius:10px;overflow:hidden}
.rel-hdr{font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
  color:var(--mt);margin-bottom:.72rem;display:flex;align-items:center;gap:.5rem}
.rel-hdr::after{content:'';flex:1;height:1px;background:var(--bd)}
.rc{display:flex;gap:.6rem;cursor:pointer;margin-bottom:.65rem;padding:.46rem;
  border-radius:9px;border:1px solid transparent;transition:all .18s;text-decoration:none;color:inherit}
.rc:hover{background:var(--s2);border-color:var(--bd)}
.rth{width:100px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--s2)}
.rth-bg{width:100px;height:60px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.rt-title{font-size:.77rem;font-weight:700;line-height:1.3;color:var(--tx);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rt-meta{font-size:.64rem;color:var(--mt);margin-top:.18rem}

/* ── KEYBOARD SHORTCUTS ── */
.kshorts{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:.88rem 1rem}
.kshorts h4{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mt);margin-bottom:.62rem}
.ks-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;font-size:.72rem;color:var(--tx2)}
.ks-key{background:var(--s3);border:1px solid var(--bd2);border-radius:4px;padding:.06rem .42rem;font-family:monospace;font-size:.67rem;color:var(--tx)}

/* ── BOTTOM AD ── */
.p-ad-bot{background:var(--s1);border-top:1px solid var(--bd);display:flex;align-items:center;
  justify-content:center;min-height:90px;padding:.5rem;position:relative;margin-top:2rem}

/* ── TOAST ── */
#tst{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(30px);z-index:9999;
  background:var(--s2);border:1px solid var(--bd2);border-radius:50px;
  padding:.68rem 1.4rem;font-size:.82rem;font-weight:600;opacity:0;
  transition:all .26s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.6);white-space:nowrap}
#tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
#tst.ok{border-color:rgba(34,197,94,.4)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){#page{grid-template-columns:1fr}#pright .sside{position:static}}
@media(max-width:768px){#page{padding:1rem}#nav{padding:0 1.2rem}.vi-title{font-size:1.2rem}}
@media(max-width:480px){.vi-acts{gap:.35rem}.vact{padding:.38rem .65rem;font-size:.72rem}}
</style>

<div id="tst"></div>

<script>
// Read video data from URL
var P = new URLSearchParams(window.location.search);
var VID = {
  id:    P.get('id')    || '',
  title: P.get('title') || 'Untitled Video',
  cat:   P.get('cat')   || 'General',
  url:   P.get('url')   || '',
  th:    P.get('th')    || '',
  dur:   P.get('dur')   || '',
  q:     P.get('q')     || '',
  yr:    P.get('yr')    || '',
  rt:    P.get('rt')    || '',
  ds:    P.get('ds')    || ''
};

var LIKES = new Set(JSON.parse(localStorage.getItem('sh_likes')||'[]'));
var PROG  = JSON.parse(localStorage.getItem('sh_prog')||'{}');
var nextTimer = null;
var ALL = [];
try{ ALL = JSON.parse(localStorage.getItem('sh_v')||'[]'); }catch(e){}
// Also store current page vids for related
try{
  var idx=ALL.findIndex(function(v){return String(v.id)===String(VID.id);});
}catch(e){}

document.addEventListener('DOMContentLoaded', function(){
  document.title = VID.title + ' — StreamHub';

  // Set info
  document.getElementById('vi-cat').textContent   = VID.cat;
  document.getElementById('vi-title').textContent = VID.title;
  document.getElementById('vi-desc').textContent  = VID.ds || 'No description available.';

  // Meta chips
  var m = '';
  if(VID.rt)  m += '<span class="chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="var(--gold)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> '+xe(VID.rt)+'</span>';
  if(VID.yr)  m += '<span class="chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> '+xe(VID.yr)+'</span>';
  if(VID.dur) m += '<span class="chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> '+xe(VID.dur)+'</span>';
  if(VID.q)   m += '<span class="chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg> '+xe(VID.q)+'</span>';
  m += '<span class="chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Watching now</span>';
  document.getElementById('vi-meta').innerHTML = m;

  // Load video
  var vid = document.getElementById('vid');
  if(VID.url){
    vid.src = VID.url;
    if(VID.th) vid.poster = VID.th;
    // Resume from saved position
    var saved = PROG[VID.id];
    if(saved && saved > 2){
      vid.addEventListener('loadedmetadata', function(){
        vid.currentTime = (saved / 100) * vid.duration;
      }, { once:true });
    }
    vid.play().catch(function(){});
  } else { showErr(); }

  updateLikeBtn();
  buildRelated();

  // Save to history
  var h = [];
  try{ h = JSON.parse(localStorage.getItem('sh_hist')||'[]'); }catch(e){}
  h = h.filter(function(x){ return x !== VID.id; });
  h.unshift(VID.id);
  localStorage.setItem('sh_hist', JSON.stringify(h.slice(0,50)));
});

function showErr(){
  document.getElementById('loader').innerHTML =
    '<p style="color:var(--mt);text-align:center;padding:2rem">Could not load this video.<br>' +
    '<a href="index.html" style="color:var(--red)">&#8592; Back to all videos</a></p>';
  document.getElementById('loader').classList.remove('gone');
}

// Save watch progress every few seconds
var lastSave = 0;
function saveProgress(){
  var vid = document.getElementById('vid');
  if(!vid.duration) return;
  var now = Date.now();
  if(now - lastSave < 3000) return;
  lastSave = now;
  var pct = Math.round((vid.currentTime / vid.duration) * 100);
  PROG[VID.id] = pct;
  localStorage.setItem('sh_prog', JSON.stringify(PROG));
}

// Auto-play next video after 8s
function onEnded(){
  var next = getNext();
  if(!next) return;
  document.getElementById('next-title').textContent = next.title || 'Next Video';
  var bar = document.getElementById('autonext');
  bar.classList.add('show');
  var fill = document.getElementById('an-fill');
  fill.style.width = '100%';
  var pct = 100;
  nextTimer = setInterval(function(){
    pct -= 1.25;
    fill.style.width = pct + '%';
    if(pct <= 0){
      clearInterval(nextTimer);
      bar.classList.remove('show');
      goToNext(next);
    }
  }, 100);
}

function cancelNext(){
  clearInterval(nextTimer);
  document.getElementById('autonext').classList.remove('show');
  toast('Autoplay cancelled');
}

function getNext(){
  if(!ALL.length) return null;
  var idx = ALL.findIndex(function(v){ return String(v.id) === String(VID.id); });
  return idx > -1 ? ALL[idx+1] || null : null;
}

function goToNext(v){
  window.location.href = 'player.html?id='+v.id+
    '&title='+encodeURIComponent(v.title||'')+
    '&cat='+encodeURIComponent(v.cat||'')+
    '&url='+encodeURIComponent(v.url||'')+
    '&th='+encodeURIComponent(v.th||'')+
    '&dur='+encodeURIComponent(v.dur||'')+
    '&q='+encodeURIComponent(v.q||'')+
    '&yr='+encodeURIComponent(v.yr||'')+
    '&rt='+encodeURIComponent(v.rt||'')+
    '&ds='+encodeURIComponent(v.ds||'');
}

function buildRelated(){
  var rel = ALL.filter(function(v){
    return String(v.id) !== String(VID.id) && v.cat === VID.cat;
  }).slice(0,5);
  var more = ALL.filter(function(v){
    return String(v.id) !== String(VID.id);
  }).slice(0, 6-rel.length);
  var list = rel.concat(more).slice(0,6);

  if(!list.length){
    document.getElementById('rel-list').innerHTML =
      '<div style="font-size:.78rem;color:var(--mt)">No related videos yet.</div>';
    return;
  }

  document.getElementById('rel-list').innerHTML = list.map(function(v){
    var bg = grd(v.cat);
    var purl = 'player.html?id='+v.id+
      '&title='+encodeURIComponent(v.title||'')+
      '&cat='+encodeURIComponent(v.cat||'')+
      '&url='+encodeURIComponent(v.url||'')+
      '&th='+encodeURIComponent(v.th||'')+
      '&dur='+encodeURIComponent(v.dur||'')+
      '&q='+encodeURIComponent(v.q||'')+
      '&yr='+encodeURIComponent(v.yr||'')+
      '&rt='+encodeURIComponent(v.rt||'')+
      '&ds='+encodeURIComponent(v.ds||'');
    return '<a class="rc" href="'+purl+'" target="_blank" rel="noopener">'+
      (v.th
        ?'<img class="rth" src="'+xe(v.th)+'" alt="'+xe(v.title)+'" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="rth-bg" style="display:none;background:'+bg+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)"><path d="M8 5v14l11-7z"/></svg></div>'
        :'<div class="rth-bg" style="background:'+bg+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)"><path d="M8 5v14l11-7z"/></svg></div>'
      )+
      '<div><div class="rt-title">'+xe(v.title)+'</div><div class="rt-meta">'+xe(v.cat||'')+(v.dur?' &middot; '+xe(v.dur):'')+'</div></div>'+
    '</a>';
  }).join('');
}

function doLike(){
  if(LIKES.has(VID.id)){ LIKES.delete(VID.id); toast('Removed from liked'); }
  else{ LIKES.add(VID.id); toast('&#10084; Liked!', 'ok'); }
  localStorage.setItem('sh_likes', JSON.stringify(Array.from(LIKES)));
  updateLikeBtn();
}
function updateLikeBtn(){
  var liked = LIKES.has(VID.id);
  ['like-btn','like-btn2'].forEach(function(id){
    var b = document.getElementById(id); if(b) b.classList.toggle('liked', liked);
  });
  ['lt','lt2'].forEach(function(id){
    var b = document.getElementById(id); if(b) b.textContent = liked ? 'Liked &#10084;' : 'Like';
  });
}
function doShare(){
  if(navigator.share) navigator.share({ title:VID.title, url:location.href });
  else copyLink();
}
function copyLink(){
  navigator.clipboard.writeText(location.href).then(function(){ toast('&#128279; Link copied!', 'ok'); });
}
function xe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function grd(c){
  var m={Movies:'linear-gradient(135deg,#1a0520,#3d0066)',Action:'linear-gradient(135deg,#1a0500,#6b1500)',
    Education:'linear-gradient(135deg,#051020,#003566)',Sports:'linear-gradient(135deg,#031a06,#006621)',
    Music:'linear-gradient(135deg,#12031a,#38006b)',Comedy:'linear-gradient(135deg,#1a1500,#6b5900)',
    Gaming:'linear-gradient(135deg,#051a0a,#006b25)',Travel:'linear-gradient(135deg,#03181a,#005f6b)',
    Cooking:'linear-gradient(135deg,#1a0a00,#6b3800)',Technology:'linear-gradient(135deg,#030518,#00166b)',
    Fitness:'linear-gradient(135deg,#1a0800,#6b2200)',Documentary:'linear-gradient(135deg,#101a10,#203d20)',
    News:'linear-gradient(135deg,#1a1010,#502000)',Vlogs:'linear-gradient(135deg,#0a1010,#004040)',
    Anime:'linear-gradient(135deg,#1a0318,#5c0060)'};
  return m[c]||'linear-gradient(135deg,#0e0e1e,#1e1e2e)';
}
function toast(msg, type){
  var t = document.getElementById('tst');
  t.innerHTML = msg; t.className = 'on'+(type?' '+type:'');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('on'); }, 2800);
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  var vid = document.getElementById('vid');
  var tag = document.activeElement.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key === ' '){ e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
  else if(e.key === 'ArrowRight'){ vid.currentTime = Math.min(vid.currentTime+10, vid.duration||0); }
  else if(e.key === 'ArrowLeft'){  vid.currentTime = Math.max(vid.currentTime-10, 0); }
  else if(e.key === 'ArrowUp'){   e.preventDefault(); vid.volume = Math.min(vid.volume+0.1, 1); }
  else if(e.key === 'ArrowDown'){ e.preventDefault(); vid.volume = Math.max(vid.volume-0.1, 0); }
  else if(e.key==='f'||e.key==='F'){ if(vid.requestFullscreen) vid.requestFullscreen(); }
  else if(e.key==='m'||e.key==='M'){ vid.muted = !vid.muted; }
  else if(e.key==='Escape'){ window.location.href = 'index.html'; }
});
</script>
