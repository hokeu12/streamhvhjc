<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Watch — StreamHub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap');
:root{
  --bg:#09090f;--s1:#111119;--s2:#181824;--s3:#20212e;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --red:#e8293e;--red2:#ff4d62;--gold:#f5c518;--cyan:#22d3ee;
  --tx:#f2f1fc;--tx2:#c0bfd8;--mt:#7a7994;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
button{font-family:'Nunito',sans-serif;cursor:pointer}
#nav{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(9,9,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:.1em;background:linear-gradient(135deg,var(--red),var(--red2),#ff8c55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nbtn{display:flex;align-items:center;gap:.3rem;background:var(--s2);border:1px solid var(--bd2);color:var(--tx2);border-radius:8px;padding:.42rem .9rem;font-size:.78rem;font-weight:700;transition:all .18s}
.nbtn:hover{background:var(--s3);color:var(--tx)}
.nbtn.liked{color:var(--red);border-color:rgba(232,41,62,.4)}
#page{display:grid;grid-template-columns:1fr 300px;gap:0;max-width:1380px;margin:0 auto;padding:1.5rem 2rem}
#pleft{min-width:0}
#pright{padding-left:1.4rem;display:flex;flex-direction:column;gap:1rem}
.player-wrap{background:#000;border-radius:12px;overflow:hidden;border:1px solid var(--bd);margin-bottom:1rem;position:relative}
#vid{width:100%;display:block;max-height:62vh;outline:none;background:#000}
.vloader{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.8rem;transition:opacity .3s}
.vloader.gone{opacity:0;pointer-events:none}
.spin{width:38px;height:38px;border:3px solid var(--s3);border-top-color:var(--red);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.vloader p{font-size:.78rem;color:var(--mt)}
.vinfo{margin-bottom:1rem}
.vi-cat{display:inline-block;background:var(--red);color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:.17rem .62rem;border-radius:5px;margin-bottom:.5rem}
.vi-title{font-size:clamp(1.1rem,2.5vw,1.6rem);font-weight:900;letter-spacing:-.02em;line-height:1.2;margin-bottom:.6rem}
.vi-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem}
.chip{display:flex;align-items:center;gap:.2rem;background:var(--s2);border:1px solid var(--bd);border-radius:50px;padding:.2rem .6rem;font-size:.72rem;color:var(--mt)}
.vi-acts{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
.vact{display:flex;align-items:center;gap:.3rem;background:var(--s2);border:1px solid var(--bd2);color:var(--tx);border-radius:8px;padding:.4rem .85rem;font-size:.76rem;font-weight:700;transition:all .18s}
.vact:hover{background:var(--s3);border-color:rgba(255,255,255,.2)}
.vact.liked{color:var(--red);border-color:rgba(232,41,62,.4)}
.vi-desc{background:var(--s1);border-radius:10px;padding:.9rem 1rem;font-size:.84rem;color:var(--mt);line-height:1.7;border:1px solid var(--bd)}
.autonext{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:.8rem 1rem;display:none;align-items:center;gap:.7rem;margin-bottom:.8rem}
.autonext.show{display:flex}
.an-prog{flex:1;height:3px;background:var(--bd);border-radius:2px}
.an-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .2s linear;width:100%}
.an-cancel{background:none;border:none;color:var(--mt);font-size:.74rem;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.an-cancel:hover{color:var(--tx)}
.sside{position:sticky;top:70px;display:flex;flex-direction:column;gap:1rem}
.rel-hdr{font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mt);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.rel-hdr::after{content:'';flex:1;height:1px;background:var(--bd)}
.rc{display:flex;gap:.6rem;cursor:pointer;margin-bottom:.6rem;padding:.45rem;border-radius:9px;border:1px solid transparent;transition:all .18s;text-decoration:none;color:inherit}
.rc:hover{background:var(--s2);border-color:var(--bd)}
.rth{width:100px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--s2)}
.rth-bg{width:100px;height:60px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rt-title{font-size:.77rem;font-weight:700;line-height:1.3;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rt-meta{font-size:.64rem;color:var(--mt);margin-top:.15rem}
.kshorts{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:.85rem 1rem}
.kshorts h4{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mt);margin-bottom:.6rem}
.ks-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.28rem;font-size:.72rem;color:var(--tx2)}
.ks-key{background:var(--s3);border:1px solid var(--bd2);border-radius:4px;padding:.05rem .4rem;font-family:monospace;font-size:.67rem;color:var(--tx)}
#tst{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(30px);z-index:9999;background:var(--s2);border:1px solid var(--bd2);border-radius:50px;padding:.68rem 1.4rem;font-size:.82rem;font-weight:600;opacity:0;transition:all .26s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.6);white-space:nowrap}
#tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
#tst.ok{border-color:rgba(34,197,94,.4)}
@media(max-width:1024px){#page{grid-template-columns:1fr}#pright .sside{position:static}}
@media(max-width:768px){#page{padding:1rem}#nav{padding:0 1.2rem}.vi-title{font-size:1.1rem}}
@media(max-width:480px){.vi-acts{gap:.3rem}.vact{padding:.36rem .6rem;font-size:.72rem}}
</style>

<script>
var P=new URLSearchParams(window.location.search);
var VID={
  id:P.get('id')||'',
  title:P.get('title')||'Untitled Video',
  cat:P.get('cat')||'General',
  url:P.get('url')||'',
  th:P.get('th')||'',
  dur:P.get('dur')||'',
  q:P.get('q')||'',
  yr:P.get('yr')||'',
  rt:P.get('rt')||'',
  ds:P.get('ds')||''
};
var LIKES=new Set(JSON.parse(localStorage.getItem('sh_likes')||'[]'));
var PROG=JSON.parse(localStorage.getItem('sh_prog')||'{}');
var nextTimer=null;
var ALL=[];
try{ALL=JSON.parse(localStorage.getItem('sh_v')||'[]');}catch(e){}

document.addEventListener('DOMContentLoaded',function(){
  document.title=VID.title+' — StreamHub';
  document.getElementById('vi-cat').textContent=VID.cat;
  document.getElementById('vi-title').textContent=VID.title;
  document.getElementById('vi-desc').textContent=VID.ds||'No description available.';
  var m='';
  if(VID.rt)m+='<span class="chip">&#9733; '+xe(VID.rt)+'</span>';
  if(VID.yr)m+='<span class="chip">'+xe(VID.yr)+'</span>';
  if(VID.dur)m+='<span class="chip">'+xe(VID.dur)+'</span>';
  if(VID.q)m+='<span class="chip">'+xe(VID.q)+'</span>';
  m+='<span class="chip">Watching now</span>';
  document.getElementById('vi-meta').innerHTML=m;
  var vid=document.getElementById('vid');
  if(VID.url){
    vid.src=VID.url;
    if(VID.th)vid.poster=VID.th;
    var saved=PROG[VID.id];
    if(saved&&saved>2){
      vid.addEventListener('loadedmetadata',function(){
        vid.currentTime=(saved/100)*vid.duration;
      },{once:true});
    }
    vid.play().catch(function(){});
  }else{showErr();}
  updateLikeBtn();
  buildRelated();
  var h=[];
  try{h=JSON.parse(localStorage.getItem('sh_hist')||'[]');}catch(e){}
  h=h.filter(function(x){return x!==VID.id;});
  h.unshift(VID.id);
  localStorage.setItem('sh_hist',JSON.stringify(h.slice(0,50)));
});

function showErr(){
  document.getElementById('loader').innerHTML='<p style="color:var(--mt);text-align:center;padding:2rem">Could not load this video.<br><a href="index.html" style="color:var(--red)">&#8592; Back to all videos</a></p>';
  document.getElementById('loader').classList.remove('gone');
}
var lastSave=0;
function saveProgress(){
  var vid=document.getElementById('vid');
  if(!vid.duration)return;
  var now=Date.now();
  if(now-lastSave<3000)return;
  lastSave=now;
  PROG[VID.id]=Math.round((vid.currentTime/vid.duration)*100);
  localStorage.setItem('sh_prog',JSON.stringify(PROG));
}
function onEnded(){
  var next=getNext();if(!next)return;
  document.getElementById('next-title').textContent=next.title||'Next Video';
  var bar=document.getElementById('autonext');
  bar.classList.add('show');
  var fill=document.getElementById('an-fill');
  fill.style.width='100%';
  var pct=100;
  nextTimer=setInterval(function(){
    pct-=1.25;fill.style.width=pct+'%';
    if(pct<=0){clearInterval(nextTimer);bar.classList.remove('show');goToNext(next);}
  },100);
}
function cancelNext(){
  clearInterval(nextTimer);
  document.getElementById('autonext').classList.remove('show');
  toast('Autoplay cancelled');
}
function getNext(){
  if(!ALL.length)return null;
  var idx=ALL.findIndex(function(v){return String(v.id)===String(VID.id);});
  return idx>-1?ALL[idx+1]||null:null;
}
function goToNext(v){
  window.location.href='player.html?id='+v.id+'&title='+encodeURIComponent(v.title||'')+'&cat='+encodeURIComponent(v.cat||'')+'&url='+encodeURIComponent(v.url||'')+'&th='+encodeURIComponent(v.th||'')+'&dur='+encodeURIComponent(v.dur||'')+'&q='+encodeURIComponent(v.q||'')+'&yr='+encodeURIComponent(v.yr||'')+'&rt='+encodeURIComponent(v.rt||'')+'&ds='+encodeURIComponent(v.ds||'');
}
function buildRelated(){
  var rel=ALL.filter(function(v){return String(v.id)!==String(VID.id)&&v.cat===VID.cat;}).slice(0,5);
  var more=ALL.filter(function(v){return String(v.id)!==String(VID.id);}).slice(0,6-rel.length);
  var list=rel.concat(more).slice(0,6);
  if(!list.length){
    document.getElementById('rel-list').innerHTML='<div style="font-size:.78rem;color:var(--mt)">No related videos yet.</div>';
    return;
  }
  document.getElementById('rel-list').innerHTML=list.map(function(v){
    var bg=grd(v.cat);
    var purl='player.html?id='+v.id+'&title='+encodeURIComponent(v.title||'')+'&cat='+encodeURIComponent(v.cat||'')+'&url='+encodeURIComponent(v.url||'')+'&th='+encodeURIComponent(v.th||'')+'&dur='+encodeURIComponent(v.dur||'')+'&q='+encodeURIComponent(v.q||'')+'&yr='+encodeURIComponent(v.yr||'')+'&rt='+encodeURIComponent(v.rt||'')+'&ds='+encodeURIComponent(v.ds||'');
    return '<a class="rc" href="'+purl+'" target="_blank" rel="noopener">'+(v.th?'<img class="rth" src="'+xe(v.th)+'" alt="'+xe(v.title)+'" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="rth-bg" style="display:none;background:'+bg+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)"><path d="M8 5v14l11-7z"/></svg></div>':'<div class="rth-bg" style="background:'+bg+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)"><path d="M8 5v14l11-7z"/></svg></div>')+'<div><div class="rt-title">'+xe(v.title)+'</div><div class="rt-meta">'+xe(v.cat||'')+(v.dur?' &middot; '+xe(v.dur):'')+'</div></div></a>';
  }).join('');
}
function doLike(){
  if(LIKES.has(VID.id)){LIKES.delete(VID.id);toast('Removed from liked');}
  else{LIKES.add(VID.id);toast('&#10084; Liked!','ok');}
  localStorage.setItem('sh_likes',JSON.stringify(Array.from(LIKES)));
  updateLikeBtn();
}
function updateLikeBtn(){
  var liked=LIKES.has(VID.id);
  ['like-btn','like-btn2'].forEach(function(id){var b=document.getElementById(id);if(b)b.classList.toggle('liked',liked);});
  ['lt','lt2'].forEach(function(id){var b=document.getElementById(id);if(b)b.textContent=liked?'Liked':'Like';});
}
function doShare(){if(navigator.share)navigator.share({title:VID.title,url:location.href});else copyLink();}
function copyLink(){navigator.clipboard.writeText(location.href).then(function(){toast('&#128279; Link copied!','ok');});}
function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function grd(c){var m={Movies:'linear-gradient(135deg,#1a0520,#3d0066)',Action:'linear-gradient(135deg,#1a0500,#6b1500)',Education:'linear-gradient(135deg,#051020,#003566)',Sports:'linear-gradient(135deg,#031a06,#006621)',Music:'linear-gradient(135deg,#12031a,#38006b)',Comedy:'linear-gradient(135deg,#1a1500,#6b5900)',Gaming:'linear-gradient(135deg,#051a0a,#006b25)',Travel:'linear-gradient(135deg,#03181a,#005f6b)',Cooking:'linear-gradient(135deg,#1a0a00,#6b3800)',Technology:'linear-gradient(135deg,#030518,#00166b)',Fitness:'linear-gradient(135deg,#1a0800,#6b2200)',Documentary:'linear-gradient(135deg,#101a10,#203d20)',News:'linear-gradient(135deg,#1a1010,#502000)',Vlogs:'linear-gradient(135deg,#0a1010,#004040)',Anime:'linear-gradient(135deg,#1a0318,#5c0060)'};return m[c]||'linear-gradient(135deg,#0e0e1e,#1e1e2e)';}
function toast(msg,type){var t=document.getElementById('tst');t.innerHTML=msg;t.className='on'+(type?' '+type:'');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on');},2800);}
document.addEventListener('keydown',function(e){
  var vid=document.getElementById('vid');
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key===' '){e.preventDefault();vid.paused?vid.play():vid.pause();}
  else if(e.key==='ArrowRight'){vid.currentTime=Math.min(vid.currentTime+10,vid.duration||0);}
  else if(e.key==='ArrowLeft'){vid.currentTime=Math.max(vid.currentTime-10,0);}
  else if(e.key==='ArrowUp'){e.preventDefault();vid.volume=Math.min(vid.volume+0.1,1);}
  else if(e.key==='ArrowDown'){e.preventDefault();vid.volume=Math.max(vid.volume-0.1,0);}
  else if(e.key==='f'||e.key==='F'){if(vid.requestFullscreen)vid.requestFullscreen();}
  else if(e.key==='m'||e.key==='M'){vid.muted=!vid.muted;}
  else if(e.key==='Escape'){window.location.href='index.html';}
});
</script>
</body>
</html>
