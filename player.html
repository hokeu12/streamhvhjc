<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>StreamHub — Premium Video Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* Glass morphism */
    .glass-card {
      background: rgba(15, 25, 45, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      font-size: 1.8rem;
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(120deg, #fff, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      color: #ddd;
      font-weight: 500;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link:hover {
      color: white;
      text-shadow: 0 0 5px rgba(167, 139, 250, 0.6);
    }

    /* Top ad banner container */
    .top-banner {
      max-width: 1400px;
      margin: 1rem auto 0;
      padding: 0 1.5rem;
      display: flex;
      justify-content: center;
    }

    .ad-container {
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Layout: main video + sidebar */
    .player-layout {
      max-width: 1400px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.8rem;
    }

    /* Video column */
    .video-column {
      min-width: 0;
    }

    .video-wrapper {
      border-radius: 1.5rem;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    video {
      width: 100%;
      display: block;
      background: #0a0a1a;
      aspect-ratio: 16 / 9;
      object-fit: contain;
    }

    /* Custom controls */
    .custom-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      padding: 1rem 1rem 0.8rem;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .video-wrapper:hover .custom-controls {
      opacity: 1;
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
    }

    .progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
    }

    .progress-filled {
      height: 100%;
      background: #a78bfa;
      border-radius: 5px;
      width: 0%;
      position: relative;
    }

    .progress-filled::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background: #a78bfa;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-bar:hover .progress-filled::after {
      opacity: 1;
    }

    .time-display {
      font-size: 0.8rem;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .control-buttons {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 6px;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    .speed-select {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Video info */
    .video-info {
      margin-top: 1rem;
      padding: 1.2rem;
    }

    .video-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .meta-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 0.8rem 0;
    }

    .badge {
      background: rgba(167, 139, 250, 0.2);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .description {
      color: #ccc;
      line-height: 1.5;
      margin-top: 0.8rem;
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-ad {
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .related-header {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .related-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .related-item {
      display: flex;
      gap: 0.8rem;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 1rem;
      transition: 0.2s;
      background: rgba(255,255,255,0.05);
    }

    .related-item:hover {
      background: rgba(255,255,255,0.15);
      transform: translateX(4px);
    }

    .related-thumb {
      width: 120px;
      height: 68px;
      background: linear-gradient(45deg, #2a2a4a, #1a1a3a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .related-info {
      flex: 1;
    }

    .related-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .related-meta {
      font-size: 0.7rem;
      color: #aaa;
      display: flex;
      gap: 0.5rem;
    }

    /* URL input panel */
    .url-panel {
      padding: 1rem;
      margin-top: 0.5rem;
    }

    .url-input-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .url-input {
      flex: 1;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 0.6rem 1rem;
      color: white;
      font-size: 0.85rem;
      outline: none;
    }

    .url-input:focus {
      border-color: #a78bfa;
    }

    button {
      background: linear-gradient(105deg, #6c47ff, #a155f0);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #a0f0a0;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 2rem;
    }

    @media (max-width: 900px) {
      .player-layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        order: 2;
      }
      .related-thumb {
        width: 100px;
        height: 56px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo-area">
    <span class="logo-icon">🎬</span>
    <span class="logo-text">StreamHub</span>
  </div>
  <div class="nav-links">
    <a href="https://yummydcorn.netlify.app/" class="nav-link" target="_blank"><i class="fas fa-home"></i> Home</a>
    <a href="#" class="nav-link" id="uploadBtn"><i class="fas fa-upload"></i> Upload</a>

  </div>
</nav>

<!-- Top Banner Ad (728x90) -->
<div class="top-banner">
  <div class="ad-container" style="width: 728px; height: 90px;">

<div class="player-layout">
  <!-- Main video column -->

      <div class="custom-controls">

  <p>🎥 StreamHub — Immersive Video Experience | Custom controls, keyboard shortcuts, and full HTML5 power</p>

<script>
  (function() {
    // --- DOM elements ---
    const video = document.getElementById('mainVideo');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const speedSelect = document.getElementById('speedSelect');
    const skipBackBtn = document.getElementById('skipBackBtn');
    const skipForwardBtn = document.getElementById('skipForwardBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const currentTimeDisplay = document.getElementById('currentTimeDisplay');
    const durationDisplay = document.getElementById('durationDisplay');
    const videoTitleElem = document.getElementById('videoTitle');
    const metaBadgesElem = document.getElementById('metaBadges');
    const videoDescElem = document.getElementById('videoDescription');
    const videoUrlInput = document.getElementById('videoUrlInput');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusMsg = document.getElementById('statusMsg');
    const relatedList = document.getElementById('relatedList');

    // --- Helper functions ---
    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      }
      return `${mins}:${secs.toString().padStart(2,'0')}`;
    }

    function showStatus(text, isError = false) {
      statusMsg.innerHTML = text;
      statusMsg.style.color = isError ? '#ffaaaa' : '#a0f0a0';
      setTimeout(() => {
        if (statusMsg.innerHTML === text) statusMsg.innerHTML = '';
      }, 4000);
    }

    // Load video from URL
    function loadVideo(url, updateHistory = true) {
      if (!url || !url.match(/^https?:\/\//i)) {
        showStatus('Invalid URL. Must start with http:// or https://', true);
        return false;
      }
      video.src = url;
      video.load();
      video.play().catch(e => {
        console.log("Autoplay prevented:", e);
        showStatus('Video loaded. Click play to start.', false);
      });
      showStatus('Loading video...', false);
      
      videoUrlInput.value = url;
      
      const params = getQueryParams();
      if (!params.title) {
        let title = url.split('/').pop().split('?')[0];
        title = decodeURIComponent(title).replace(/\.(mp4|mov|avi|mkv|webm)$/i, '');
        videoTitleElem.textContent = title || 'Custom Video';
        metaBadgesElem.innerHTML = '<span class="badge"><i class="fas fa-link"></i> Direct URL</span>';
        videoDescElem.textContent = '';
      }
      return true;
    }

    // --- Parse query parameters (id, title, cat, url, dur, q, yr, ds, etc.) ---
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      const result = {};
      for (const [key, value] of params.entries()) {
        result[key] = decodeURIComponent(value);
      }
      return result;
    }

    // Update UI with metadata from URL params
    function applyMetadataFromParams() {
      const params = getQueryParams();
      if (params.title) videoTitleElem.textContent = params.title;
      if (params.ds) videoDescElem.textContent = params.ds;
      
      const badges = [];
      if (params.cat) badges.push(`<span class="badge"><i class="fas fa-tag"></i> ${params.cat}</span>`);
      if (params.q) badges.push(`<span class="badge"><i class="fas fa-hd"></i> ${params.q}</span>`);
      if (params.dur) badges.push(`<span class="badge"><i class="fas fa-clock"></i> ${params.dur}</span>`);
      if (params.yr) badges.push(`<span class="badge"><i class="fas fa-calendar"></i> ${params.yr}</span>`);
      if (badges.length === 0 && params.url) {
        badges.push(`<span class="badge"><i class="fas fa-video"></i> Stream</span>`);
      }
      metaBadgesElem.innerHTML = badges.join('');
    }

    // Initialize video from URL parameter
    function initFromParams() {
      const params = getQueryParams();
      if (params.url) {
        let videoUrl = params.url;
        try {
          if (videoUrl.includes('%')) videoUrl = decodeURIComponent(videoUrl);
        } catch(e) {}
        loadVideo(videoUrl, false);
        applyMetadataFromParams();
        return true;
      }
      return false;
    }

    // --- Custom Controls Event Handlers ---
    function updatePlayPauseIcon() {
      const icon = playPauseBtn.querySelector('i');
      if (video.paused) {
        icon.className = 'fas fa-play';
      } else {
        icon.className = 'fas fa-pause';
      }
    }

    function togglePlayPause() {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    }

    function updateProgress() {
      if (video.duration) {
        const percent = (video.currentTime / video.duration) * 100;
        progressFilled.style.width = `${percent}%`;
        currentTimeDisplay.textContent = formatTime(video.currentTime);
        durationDisplay.textContent = formatTime(video.duration);
      }
    }

    function setProgress(e) {
      const rect = progressBar.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      video.currentTime = pos * video.duration;
    }

    function updateVolumeIcon() {
      const icon = muteBtn.querySelector('i');
      if (video.muted || video.volume === 0) {
        icon.className = 'fas fa-volume-mute';
      } else if (video.volume < 0.5) {
        icon.className = 'fas fa-volume-down';
      } else {
        icon.className = 'fas fa-volume-up';
      }
    }

    function toggleMute() {
      video.muted = !video.muted;
      volumeSlider.value = video.muted ? 0 : video.volume;
      updateVolumeIcon();
    }

    function changeVolume() {
      video.volume = volumeSlider.value;
      video.muted = false;
      updateVolumeIcon();
    }

    function skip(seconds) {
      video.currentTime = Math.min(Math.max(video.currentTime + seconds, 0), video.duration);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    function changePlaybackSpeed() {
      video.playbackRate = parseFloat(speedSelect.value);
    }

    // --- Related Videos (static list + dynamic based on current video metadata) ---
    const sampleRelated = [
      { title: "Funny Animal Compilation", category: "Comedy", duration: "12:34", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4", thumb: "🐾" },
      { title: "Epic Nature Scenery", category: "Nature", duration: "8:22", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4", thumb: "🌿" },
      { title: "Tech Review 2025", category: "Tech", duration: "15:47", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCarCanYouGetForAGrand.mp4", thumb: "💻" },
      { title: "Cinematic Drone Shots", category: "Travel", duration: "6:18", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4", thumb: "🎥" }
    ];

    function buildRelatedList() {
      const params = getQueryParams();
      let category = params.cat || '';
      let filtered = sampleRelated;
      if (category) {
        filtered = sampleRelated.filter(v => v.category.toLowerCase().includes(category.toLowerCase()));
        if (filtered.length === 0) filtered = sampleRelated;
      }
      relatedList.innerHTML = '';
      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'related-item';
        div.innerHTML = `
          <div class="related-thumb">${item.thumb}</div>
          <div class="related-info">
            <div class="related-title">${item.title}</div>
            <div class="related-meta"><span>${item.category}</span> • <span>${item.duration}</span></div>
          </div>
        `;
        div.addEventListener('click', () => {
          const newUrl = new URL(window.location.href);
          newUrl.searchParams.set('url', item.url);
          newUrl.searchParams.set('title', item.title);
          newUrl.searchParams.set('cat', item.category);
          newUrl.searchParams.set('dur', item.duration);
          window.history.pushState({}, '', newUrl);
          loadVideo(item.url, false);
          videoTitleElem.textContent = item.title;
          metaBadgesElem.innerHTML = `<span class="badge"><i class="fas fa-tag"></i> ${item.category}</span><span class="badge"><i class="fas fa-clock"></i> ${item.duration}</span>`;
          videoDescElem.textContent = '';
          showStatus(`Now playing: ${item.title}`, false);
        });
        relatedList.appendChild(div);
      });
    }

    // --- Keyboard shortcuts ---
    function handleKeyPress(e) {
      const tag = document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      switch(e.key.toLowerCase()) {
        case ' ': case 'k': e.preventDefault(); togglePlayPause(); break;
        case 'arrowleft': e.preventDefault(); skip(-10); break;
        case 'arrowright': e.preventDefault(); skip(10); break;
        case 'arrowup': e.preventDefault(); video.volume = Math.min(video.volume + 0.1, 1); volumeSlider.value = video.volume; updateVolumeIcon(); break;
        case 'arrowdown': e.preventDefault(); video.volume = Math.max(video.volume - 0.1, 0); volumeSlider.value = video.volume; updateVolumeIcon(); break;
        case 'f': e.preventDefault(); toggleFullscreen(); break;
        case 'm': e.preventDefault(); toggleMute(); break;
        case '0': case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8': case '9':
          const num = parseInt(e.key);
          if (!isNaN(num)) {
            video.currentTime = (num / 10) * video.duration;
          }
          break;
      }
    }

    // --- Manual load from input ---
    function manualLoad() {
      let url = videoUrlInput.value.trim();
      if (!url) {
        showStatus('Please enter a video URL', true);
        return;
      }
      loadVideo(url, true);
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set('url', url);
      newUrl.searchParams.delete('title');
      newUrl.searchParams.delete('cat');
      window.history.pushState({}, '', newUrl);
      videoTitleElem.textContent = url.split('/').pop().split('?')[0] || 'Custom Video';
      metaBadgesElem.innerHTML = '<span class="badge"><i class="fas fa-link"></i> Direct URL</span>';
      videoDescElem.textContent = '';
    }

    function clearPlayer() {
      video.pause();
      video.removeAttribute('src');
      video.load();
      videoTitleElem.textContent = 'No video loaded';
      metaBadgesElem.innerHTML = '';
      videoDescElem.textContent = '';
      videoUrlInput.value = '';
      currentTimeDisplay.textContent = '0:00';
      durationDisplay.textContent = '0:00';
      progressFilled.style.width = '0%';
      showStatus('Player cleared', false);
    }

    // --- Event listeners ---
    video.addEventListener('play', updatePlayPauseIcon);
    video.addEventListener('pause', updatePlayPauseIcon);
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('loadedmetadata', () => {
      durationDisplay.textContent = formatTime(video.duration);
      updateProgress();
    });
    video.addEventListener('ended', () => {
      playPauseBtn.querySelector('i').className = 'fas fa-play';
      showStatus('Video ended', false);
    });

    playPauseBtn.addEventListener('click', togglePlayPause);
    muteBtn.addEventListener('click', toggleMute);
    volumeSlider.addEventListener('input', changeVolume);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    speedSelect.addEventListener('change', changePlaybackSpeed);
    skipBackBtn.addEventListener('click', () => skip(-10));
    skipForwardBtn.addEventListener('click', () => skip(10));
    progressBar.addEventListener('click', setProgress);
    loadUrlBtn.addEventListener('click', manualLoad);
    clearBtn.addEventListener('click', clearPlayer);
    document.addEventListener('keydown', handleKeyPress);

    // Navigation buttons
    document.getElementById('uploadBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'https://yummydcorn.netlify.app/#upload-section';
    });
    document.getElementById('galleryBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'https://yummydcorn.netlify.app/';
    });

    // --- Initialization ---
    if (!initFromParams()) {
      videoTitleElem.textContent = 'No video selected';
      metaBadgesElem.innerHTML = '<span class="badge"><i class="fas fa-info-circle"></i> Paste a URL or select from related</span>';
      videoDescElem.textContent = 'Use the input above or click a related video to start watching.';
    }
    buildRelatedList();

    updateVolumeIcon();
  })();
</script>
</body>
</html>
