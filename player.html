<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">StreamHub Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #050507;
            --bg-surface: #121217;
            --accent: #ff4d4d;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: #1e293b;
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .main-container {
            max-width: 1400px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
            padding: 0 20px;
        }

        /* The Player - No Ads Above, Below, or Inside */
        .video-content {
            display: flex;
            flex-direction: column;
        }

        .video-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .video-header {
            margin-top: 24px;
        }

        .category-tag {
            background: rgba(255, 77, 77, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        h1 {
            font-size: 32px;
            margin: 16px 0 8px 0;
            font-weight: 700;
        }

        .stats {
            display: flex;
            gap: 20px;
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .description-card {
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 12px;
            line-height: 1.6;
            color: #d1d5db;
            border: 1px solid var(--border);
        }

        /* Sidebar - No Ad Slots */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-card {
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .side-card h3 {
            font-size: 14px;
            margin: 0 0 16px 0;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .key-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
        }

        kbd {
            background: #2d2d39;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: ui-monospace, monospace;
            color: #fff;
            border-bottom: 2px solid #000;
        }

        @media (max-width: 1100px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { order: 2; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">STREAMHUB</a>
        <div style="display: flex; gap: 12px;">
            <button style="background: transparent; border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Share</button>
            <button style="background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">Browse All</button>
        </div>
    </nav>

    <div class="main-container">
        <main class="video-content">
            <div class="video-viewport">
                <video id="player" controls autoplay poster="">
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="video-header">
                <span class="category-tag" id="v-cat">Action</span>
                <h1 id="v-title">Movie Title</h1>
                <div class="stats">
                    <span>⭐ <span id="v-rate">N/A</span> Rating</span>
                    <span>📅 <span id="v-year">2026</span></span>
                    <span>HD 1080p</span>
                </div>
                <div class="description-card" id="v-desc">
                    No description available for this stream.
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="side-card">
                <h3>Shortcuts</h3>
                <div class="key-row"><span>Play / Pause</span> <kbd>Space</kbd></div>
                <div class="key-row"><span>Seek Forward</span> <kbd>→</kbd></div>
                <div class="key-row"><span>Seek Back</span> <kbd>←</kbd></div>
                <div class="key-row"><span>Full Screen</span> <kbd>F</kbd></div>
                <div class="key-row"><span>Mute Audio</span> <kbd>M</kbd></div>
            </div>

            <div class="side-card">
                <h3>Up Next</h3>
                <p style="color: var(--text-dim); font-size: 13px; text-align: center;">Queue is empty.</p>
            </div>
        </aside>
    </div>

    <script>
        // High-IQ URL Parser
        (function loadStream() {
            const params = new URLSearchParams(window.location.search);
            
            const mapping = {
                'url': (val) => document.getElementById('player').src = decodeURIComponent(val),
                'title': (val) => {
                    const t = decodeURIComponent(val);
                    document.getElementById('v-title').innerText = t;
                    document.getElementById('dynamic-title').innerText = t + " | StreamHub";
                },
                'cat': (val) => document.getElementById('v-cat').innerText = val,
                'ds': (val) => document.getElementById('v-desc').innerText = decodeURIComponent(val),
                'yr': (val) => document.getElementById('v-year').innerText = val,
                'rt': (val) => document.getElementById('v-rate').innerText = val
            };

            for (const [key, func] of Object.entries(mapping)) {
                const value = params.get(key);
                if (value) func(value);
            }
        })();
    </script>
</body>
</html>
