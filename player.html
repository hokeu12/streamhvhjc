<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="v-page-title">StreamHub | Premium Player</title>
    <style>
        /* Pro-Level UI Styling */
        :root { --main-bg: #050507; --surface: #111116; --accent: #ff4d4d; --text: #ffffff; }
        * { box-sizing: border-box; }
        body { background: var(--main-bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 20px; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 30px; }
        .logo { color: var(--accent); font-weight: 900; font-size: 28px; text-decoration: none; letter-spacing: -1px; }

        /* Clean Layout: No Gaps for Ads */
        .wrapper { display: grid; grid-template-columns: 1fr 340px; gap: 30px; max-width: 1400px; margin: 0 auto; }
        
        /* Player Box - Ad containers deleted */
        .player-area { width: 100%; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid #1e1e26; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        video { width: 100%; height: 100%; display: block; }

        .details { margin-top: 25px; }
        .badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        h1 { font-size: 36px; margin: 15px 0; letter-spacing: -0.5px; }
        .meta { color: #888; display: flex; gap: 20px; font-size: 14px; margin-bottom: 25px; }
        .desc-card { background: var(--surface); padding: 25px; border-radius: 14px; line-height: 1.7; color: #b0b0b8; border: 1px solid #1e1e26; }

        /* Sidebar - No ad boxes */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--surface); padding: 20px; border-radius: 14px; border: 1px solid #1e1e26; }
        .panel h3 { margin: 0 0 15px; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .key { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 12px; }
        kbd { background: #222; padding: 2px 7px; border-radius: 4px; font-family: monospace; border: 1px solid #333; }

        @media (max-width: 1100px) { .wrapper { grid-template-columns: 1fr; } }

        /* CSS Guard: Physically hides the ad IDs if they exist anywhere else */
        #top-ad-slot, #side-ad-1, #mid-ad-slot, .advertisement { display: none !important; visibility: hidden !important; height: 0 !important; width: 0 !important; margin: 0 !important; padding: 0 !important; }
    </style>
</head>
<body>

<div class="nav">
    <a href="/" class="logo">STREAMHUB</a>
    <button style="background:var(--accent); border:none; color:white; padding:10px 25px; border-radius:8px; font-weight:bold; cursor:pointer;">Browse All</button>
</div>

<div class="wrapper">
    <main class="player-area">
        <div class="video-wrapper">
            <video id="v-player" controls autoplay poster="">
                <source src="" type="video/mp4">
            </video>
        </div>

        <div class="details">
            <span class="badge" id="v-cat">Action</span>
            <h1 id="v-title">Streaming Now...</h1>
            <div class="meta">
                <span>⭐ <span id="v-rate">0.0</span> Rating</span>
                <span>📅 <span id="v-year">2026</span></span>
                <span>1080p Ultra HD</span>
            </div>
            <div class="desc-card" id="v-desc">Loading video data...</div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="panel">
            <h3>Player Controls</h3>
            <div class="key"><span>Play / Pause</span> <kbd>Space</kbd></div>
            <div class="key"><span>Seek Forward</span> <kbd>→</kbd></div>
            <div class="key"><span>Seek Backward</span> <kbd>←</kbd></div>
            <div class="key"><span>Fullscreen</span> <kbd>F</kbd></div>
            <div class="key"><span>Mute Audio</span> <kbd>M</kbd></div>
        </div>

        <div class="panel" style="text-align: center;">
            <h3>Up Next</h3>
            <p style="color: #444; font-size: 13px;">No videos in queue.</p>
        </div>
    </aside>
</div>

<script>
    /* High-Performance Parser */
    (function init() {
        const u = new URLSearchParams(window.location.search);
        
        // Grab values from your link
        const vid = u.get('url');
        const tit = u.get('title');
        const cat = u.get('cat');
        const des = u.get('ds');
        const yr  = u.get('yr');
        const rt  = u.get('rt');

        if (vid) document.getElementById('v-player').src = decodeURIComponent(vid);
        if (tit) {
            const name = decodeURIComponent(tit);
            document.getElementById('v-title').innerText = name;
            document.getElementById('v-page-title').innerText = name + " | StreamHub";
        }
        if (cat) document.getElementById('v-cat').innerText = cat;
        if (des) document.getElementById('v-desc').innerText = decodeURIComponent(des);
        if (yr)  document.getElementById('v-year').innerText = yr;
        if (rt)  document.getElementById('v-rate').innerText = rt;
    })();
</script>

</body>
</html>
