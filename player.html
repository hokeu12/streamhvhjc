<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body{
  margin:0;
  background:#0b0b12;
  color:#fff;
  font-family:Arial, sans-serif;
}

.player-container{
  max-width:900px;
  margin:40px auto;
  padding:0 15px;
}

video{
  width:100%;
  border-radius:10px;
  background:#000;
}

.video-info{
  margin-top:15px;
}

.video-title{
  font-size:20px;
  font-weight:bold;
}

.video-meta{
  font-size:14px;
  color:#aaa;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="player-container">

  <!-- VIDEO PLAYER -->
  <video id="player" controls autoplay></video>

  <!-- 🔥 BEST PLACEMENT: Native Ad (HIGH CTR) -->
  <div style="margin:25px 0; text-align:center;">
    <script async="async" data-cfasync="false" src="https://pl28972109.profitablecpmratenetwork.com/c1df7fbc6e920a6327e3382850f6ae9f/invoke.js"></script>
    <div id="container-c1df7fbc6e920a6327e3382850f6ae9f"></div>
  </div>

  <!-- VIDEO INFO -->
  <div class="video-info">
    <div class="video-title" id="title">Loading...</div>
    <div class="video-meta" id="meta"></div>
  </div>

</div>

<script>
// GET URL PARAMS
const params = new URLSearchParams(window.location.search);

const video = document.getElementById("player");
const title = document.getElementById("title");
const meta = document.getElementById("meta");

// SET DATA
video.src = params.get("url") || "";
title.textContent = params.get("title") || "Untitled Video";

meta.textContent =
  (params.get("cat") || "Unknown") + " • " +
  (params.get("yr") || "") + " • " +
  (params.get("dur") || "");

// SIMPLE ERROR FALLBACK
video.onerror = function(){
  alert("Video failed to load");
};
</script>

</body>
</html>
