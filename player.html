<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Player</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

<script async="async" data-cfasync="false" src="https://pl28972109.profitablecpmratenetwork.com/c1df7fbc6e920a6327e3382850f6ae9f/invoke.js"></script>
<div id="container-c1df7fbc6e920a6327e3382850f6ae9f"></div>

}

/* Player Container */
.player-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: auto;
}

/* Video */
video {
    width: 100%;
    height: auto;
    background: #000;
}

/* Pre-roll Ad Overlay */
#adOverlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#adOverlay button {
    margin-top: 15px;
    padding: 10px 20px;
    background: gray;
    border: none;
    color: white;
    cursor: not-allowed;
}

#adOverlay button.active {
    background: red;
    cursor: pointer;
}

/* Bottom Ad */
.bottom-ad {
    width: 100%;
    background: #111;
    text-align: center;
    padding: 15px;
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
}

/* Controls */
.controls {
    text-align: center;
    margin-top: 10px;
}

button.fullscreen {
    padding: 10px 15px;
    background: #222;
    color: #fff;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- TOP AD (Ad Slot 1) -->
<div class="top-ad">
    🔥 Your Ad Here (Top Banner Ad Slot)
</div>

<!-- PLAYER -->
<div class="player-container">

    <!-- VIDEO -->
    <video id="videoPlayer" controls>
        <source src="YOUR_VIDEO_URL.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <!-- PRE-ROLL AD OVERLAY -->
    <div id="adOverlay">
        <h2>Advertisement</h2>
        <p id="adTimer">Wait 5 seconds...</p>
        <button id="skipBtn" disabled>Skip Ad</button>
    </div>

</div>

<!-- CONTROLS -->
<div class="controls">
    <button class="fullscreen" onclick="openFullscreen()">Fullscreen</button>
</div>

<!-- BOTTOM AD (Ad Slot 2) -->
<div class="bottom-ad">
    🔥 Your Ad Here (Bottom Banner Ad Slot)
</div>

<script>
let timeLeft = 5;
let skipBtn = document.getElementById("skipBtn");
let adTimer = document.getElementById("adTimer");
let adOverlay = document.getElementById("adOverlay");
let video = document.getElementById("videoPlayer");

// Countdown for pre-roll ad
let countdown = setInterval(() => {
    timeLeft--;
    adTimer.innerText = "Wait " + timeLeft + " seconds...";

    if(timeLeft <= 0){
        clearInterval(countdown);
        skipBtn.disabled = false;
        skipBtn.classList.add("active");
        skipBtn.innerText = "Skip Ad";
        adTimer.innerText = "You can now skip the ad";
    }
}, 1000);

// Skip ad
skipBtn.addEventListener("click", () => {
    if(!skipBtn.disabled){
        adOverlay.style.display = "none";
        video.play();
    }
});

// Fullscreen
function openFullscreen() {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
    }
}
</script>

</body>
</html>
