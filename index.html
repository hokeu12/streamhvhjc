<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0b12;color:#fff;padding-bottom:90px;}
.top{display:flex;justify-content:space-between;align-items:center;padding:15px;}
button{background:#e8293e;border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}

.card{position:relative;background:#151522;border-radius:10px;overflow:hidden;}
.card img,.card video{width:100%;height:160px;object-fit:cover;}
.card video{position:absolute;top:0;left:0;display:none;}
.card h3{padding:8px;font-size:13px;margin:0;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;}
.modal-box{background:#111;padding:20px;border-radius:10px;width:360px;max-height:90vh;overflow:auto;}
.modal input, textarea{width:100%;margin-bottom:10px;padding:8px;border:none;}

.copy-msg{font-size:12px;color:#4caf50;opacity:0;}
.copy-msg.show{opacity:1;}

.bottom-ad{position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:center;background:#000;z-index:9999;}
</style>
</head>

<body>

<div class="top">
<h2>StreamHub</h2>
<button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Smart Converter</h3>
<textarea id="rawInput"></textarea>
<button onclick="convertEmbed()">Convert</button>

<div id="convertOutput"></div>

<button onclick="addConverted()">Add to Site</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

var PL="player.html";

/* FULL CLEAN VIDEO DATA (YOUR DATA FIXED) */
var VV=[

{id:1775817048469,title:"Clip 870",cat:"Clip 870",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326381/default_deeceh.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326381/default_deeceh.jpg"},

{id:1775817079262,title:"Clip 744",cat:"Clip 744",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326371/38307397DiskWala_File_0af9b1fd3a_wqmgo4.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326371/38307397DiskWala_File_0af9b1fd3a_wqmgo4.jpg"},

{id:1775817111728,title:"Clip 283",cat:"Clip 283",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326368/46593737DiskWala_File_405eef97a3_do34yb.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326368/46593737DiskWala_File_405eef97a3_do34yb.jpg"},

{id:1775834384638,title:"Clip 1",cat:"Clip 1",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326303/2776_y4duuv.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326303/2776_y4duuv.jpg"},

{id:1775834384639,title:"Clip 2",cat:"Clip 2",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326298/2023-09-23-12-36-47_1_oqw7s6.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326298/2023-09-23-12-36-47_1_oqw7s6.jpg"},

{id:1775820124722,title:"Clip 915",cat:"Clip 915",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326315/158157521050758_avn5gd.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326315/158157521050758_avn5gd.jpg"},

{id:1775817607773,title:"Clip 416",cat:"Clip 416",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326346/VID_20260404_083603_802_wfivi2.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326346/VID_20260404_083603_802_wfivi2.jpg"},

{id:1775465413152,title:"mms 1",cat:"mms",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326342/2023-10-31-14-44-38_3_dzvcp9.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326342/2023-10-31-14-44-38_3_dzvcp9.jpg"}

];

/* RENDER */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

VV.forEach(v=>{
if(!v.url) return;

let a=document.createElement("a");
a.href=PL+"?url="+encodeURIComponent(v.url);
a.target="_blank";

a.innerHTML=`
<div class="card" onmouseenter="playPreview(this)" onmouseleave="stopPreview(this)">
<img src="${v.th}">
<video muted loop preload="metadata">
<source src="${v.url}" type="video/mp4">
</video>
<h3>${v.title}</h3>
</div>`;
grid.appendChild(a);
});
}
render();

/* VIDEO FIX */
function playPreview(card){
if(window.innerWidth<768) return;
let v=card.querySelector("video");
let i=card.querySelector("img");
v.style.display="block";
v.play().catch(()=>{});
i.style.opacity="0";
}
function stopPreview(card){
let v=card.querySelector("video");
let i=card.querySelector("img");
v.pause();
v.style.display="none";
i.style.opacity="1";
}

/* SMART CONVERTER FINAL FORMAT */
var convertedData=[];

function convertEmbed(){
let raw=document.getElementById("rawInput").value;
if(!raw) return;

let matches=raw.match(/{[\s\S]*?}/g);
let output="";

convertedData=[];

matches.forEach((str,i)=>{
let url=(str.match(/url\s*:\s*"([^"]+)"/)||[])[1]||"";
let title=(str.match(/title\s*:\s*"([^"]+)"/)||[])[1]||("Clip "+(i+1));
let cat=(str.match(/cat\s*:\s*"([^"]+)"/)||[])[1]||title;

let th=url.replace("/video/upload/","/video/upload/c_fill,ar_9:16,g_auto,so_1/").replace(".mp4",".jpg");

let id=Date.now()+Math.floor(Math.random()*1000);

convertedData.push({id,title,cat,url,th});

output+=`{ id:${id},title:"${title}",cat:"${cat}",
url:"${url}",
th:"${th}"
},\n\n`;
});

document.getElementById("convertOutput").innerHTML=
`<pre id="finalCode">${output}</pre>
<button onclick="copyText('finalCode','msg')">Copy</button>
<div id="msg" class="copy-msg">Copied ✓</div>`;
}

function addConverted(){
VV.unshift(...convertedData);
render();
}

function copyText(id,msgId){
let text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
let msg=document.getElementById(msgId);
msg.classList.add("show");
setTimeout(()=>msg.classList.remove("show"),1000);
}

function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

</script>
