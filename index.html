<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{
  position:relative;
  background:#151522;
  border-radius:10px;
  overflow:hidden;
}

/* SKELETON (NO REMOVAL EFFECT) */
.skeleton{
  width:100%;
  height:160px;
  background:linear-gradient(90deg,#222,#333,#222);
  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
  position:absolute;
  top:0;
  left:0;
  z-index:1;
}

@keyframes shimmer{
  0%{background-position:-200% 0;}
  100%{background-position:200% 0;}
}

/* IMAGE (NO TRANSITION = NO BLUR) */
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
  position:relative;
  z-index:2;
}

/* VIDEO */
.card video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:160px;
  object-fit:cover;
  display:none;
  z-index:3;
}

/* TITLE */
.card h3{
  padding:10px;
  font-size:14px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.modal input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
}

#codeBox{
  background:#000;
  padding:10px;
  font-size:12px;
  word-break:break-all;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
  <h2>StreamHub</h2>
  <button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add Video</h3>
    <input id="title" placeholder="Title">
    <input id="cat" placeholder="Category">
    <input id="url" placeholder="Video URL">
    <input id="th" placeholder="Thumbnail URL">
    <button onclick="generate()">Generate Code</button>
    <div id="codeBox"></div>
    <button onclick="closeModal()">Close</button>

</div>

/* PRELOAD */
function preloadNextVideos(i){
  for(let x=i+1;x<=i+2;x++){
    if(VV[x]){
      let l=document.createElement("link");
      l.rel="preload";
      l.as="video";
      l.href=VV[x].url;
      document.head.appendChild(l);
    }
  }
}

/* RENDER */
function render(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";

  VV.forEach((v,i)=>{
    let a=document.createElement("a");
    a.href=PL+"?url="+encodeURIComponent(v.url);
    a.target="_blank";

    a.innerHTML=`
      <div class="card"
        onmouseenter="playPreview(this,${i})"
        onmouseleave="stopPreview(this)">

        <div class="skeleton"></div>

        <img src="${v.th}" loading="lazy">

        <video muted loop preload="none">
          <source src="${v.url}" type="video/mp4">
        </video>

        <h3>${v.title}</h3>
      </div>
    `;
    grid.appendChild(a);
  });
}
render();

/* PREVIEW (CLEAN - NO BLUR) */
function playPreview(card,i){
  if(window.innerWidth<768) return;

  preloadNextVideos(i);

  let v=card.querySelector("video");
  v.style.display="block";
  v.currentTime=2;
  v.play();
}

function stopPreview(card){
  if(window.innerWidth<768) return;

  let v=card.querySelector("video");
  v.pause();
  v.style.display="none";
}

/* MODAL */
function openModal(){modal.style.display="flex";}
function closeModal(){modal.style.display="none";}

/* GENERATE */
function generate(){
  let id=Date.now();
  codeBox.innerText=`{id:${id},title:"${title.value}",cat:"${cat.value}",url:"${url.value}",th:"${th.value}"},`;
}
