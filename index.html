<style>
body{margin:0;font-family:sans-serif;background:#0b0b12;color:#fff;padding-bottom:90px;}
.top{display:flex;justify-content:space-between;align-items:center;padding:15px;}
button{background:#e8293e;border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
.card{position:relative;background:#151522;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:160px;object-fit:cover;}
.card video{position:absolute;top:0;width:100%;height:160px;object-fit:cover;display:none;}
.card h3{padding:8px;font-size:13px;margin:0;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;}
.modal-box{background:#111;padding:20px;border-radius:10px;width:360px;max-height:90vh;overflow:auto;}
.modal input, textarea{width:100%;margin-bottom:10px;padding:8px;border:none;}
.copy-msg{font-size:12px;color:#4caf50;opacity:0;transition:.4s;}
.copy-msg.show{opacity:1;}
.bottom-ad{position:fixed;bottom:0;width:100%;display:flex;justify-content:center;background:#000;z-index:9999;}
</style>
</head>

<h3>Bulk Upload (JSON)</h3>
<textarea id="bulkData" placeholder='[{"title":"Video","url":"..."}]'></textarea>
<button onclick="copyText('bulkData','bulkMsg')">📋 Copy JSON</button>
<div id="bulkMsg" class="copy-msg">Copied ✓</div>
<button onclick="bulkUpload()">Upload Bulk</button>

<hr>

<h3>Smart Converter (FINAL)</h3>
<textarea id="rawInput" placeholder="Paste multiple objects..."></textarea>
<button onclick="convertEmbed()">Convert</button>

<div id="convertOutput"></div>

<button onclick="addConverted()">Add to Site</button>

<hr>

<button onclick="closeModal()">Close</button>

/* RENDER */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";
VV.forEach(v=>{
let a=document.createElement("a");
a.href=PL+"?url="+encodeURIComponent(v.url);
a.target="_blank";
a.innerHTML=`
<div class="card" onmouseenter="playPreview(this)" onmouseleave="stopPreview(this)">
<img src="${v.th}">
<video muted loop><source src="${v.url}"></video>
<h3>${v.title}</h3>
</div>`;
grid.appendChild(a);
});
}
render();

/* PREVIEW */
function playPreview(c){
if(window.innerWidth<768)return;
let v=c.querySelector("video"),i=c.querySelector("img");
v.style.display="block";v.play();i.style.opacity="0";
}
function stopPreview(c){
let v=c.querySelector("video"),i=c.querySelector("img");
v.pause();v.style.display="none";i.style.opacity="1";
}

/* MANUAL */
function generate(){
let t=val("title"),c=val("cat"),u=val("url").trim(),th=val("th").trim()||autoThumb(u);
let id=Date.now();

let code=`{ id:${id},title:"${t}",cat:"${c}",
url:"${u}",
th:"${th}"
},`;

document.getElementById("codeBox").innerHTML=`
<pre id="embedText">${code}</pre>
<button onclick="copyText('embedText','manualMsg')">📋 Copy</button>
<div id="manualMsg" class="copy-msg">Copied ✓</div>
`;

VV.unshift({id:id,title:t,cat:c,url:u,th:th});
render();
}

/* BULK */
function bulkUpload(){
try{
let arr=JSON.parse(val("bulkData"));
arr.forEach(v=>{
let url=v.url.trim();
if(!url.includes(".mp4")) return;
VV.unshift({
id:Date.now()+Math.random(),
title:v.title||"Untitled",
cat:v.cat||"",
url:url,
th:v.th||autoThumb(url)
});
});
render();
}catch(e){alert("Invalid JSON");}
}

/* SMART CONVERTER */
var convertedData=[];

function convertEmbed(){
let raw=val("rawInput");
if(!raw) return;

convertedData=[];
let matches=raw.match(/{[\s\S]*?}/g);
if(!matches) return;

let output="";

matches.forEach((str,i)=>{
let url=(str.match(/url\s*:\s*"([^"]+)"/)||[])[1]||"";
url=url.trim();
if(!url.includes(".mp4")) return;

let title=(str.match(/title\s*:\s*"([^"]+)"/)||[])[1]||("Clip "+(i+1));
let cat=(str.match(/cat\s*:\s*"([^"]+)"/)||[])[1]||title;

let th=autoThumb(url);

let obj={id:Date.now()+Math.random(),title,cat,url,th};
convertedData.push(obj);

output+=`{ id:${obj.id},title:"${obj.title}",cat:"${obj.cat}",
url:"${obj.url}",
th:"${obj.th}"
},\n\n`;
});

document.getElementById("convertOutput").innerHTML=`
<pre id="finalCode">${output}</pre>
<button onclick="copyText('finalCode','convMsg')">📋 Copy</button>
<div id="convMsg" class="copy-msg">Copied ✓</div>
`;
}

/* ADD */
function addConverted(){
convertedData.forEach(v=>VV.unshift(v));
render();
}

/* COPY */
function copyText(id,msgId){
let text=document.getElementById(id).innerText||document.getElementById(id).value;
navigator.clipboard.writeText(text);
let m=document.getElementById(msgId);
m.classList.add("show");
setTimeout(()=>m.classList.remove("show"),1200);
}

/* HELPERS */
function autoThumb(url){
if(!url.includes("cloudinary")) return "";
return url.replace("/video/upload/","/video/upload/c_fill,ar_9:16,g_auto,so_1/")
.replace(".mp4",".jpg");
}
function val(id){return document.getElementById(id).value;}

/* MODAL */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}
