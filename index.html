<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b0b12;
color:#fff;
padding-bottom:90px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

button{
background:#e8293e;
border:none;
color:#fff;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:20px;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
position:relative;
background:#151522;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card video{
position:absolute;
top:0;
left:0;
width:100%;
height:160px;
object-fit:cover;
display:none;
}

.card h3{
padding:8px;
font-size:13px;
margin:0;
}

.pagination{
text-align:center;
margin-bottom:20px;
}

.pagination button{
margin:5px;
}

.url-row{
display:flex;
gap:5px;
}

.url-row input{
flex:1;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:20px;
border-radius:10px;
width:360px;
max-height:90vh;
overflow:auto;
}

.modal input,
textarea{
width:100%;
margin-bottom:10px;
padding:8px;
border:none;
}

.copy-msg{
font-size:12px;
color:#4caf50;
opacity:0;
transition:.4s;
}

.copy-msg.show{
opacity:1;
}

.bottom-ad{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:center;
background:#000;
z-index:9999;
}
</style>
</head>

<body>

<div class="top">
<h2>StreamHub</h2>
<button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<div class="pagination">
<button onclick="prevPage()">⬅ Prev</button>
<span id="pageNum"></span>
<button onclick="nextPage()">Next ➡</button>
</div>


<div class="modal" id="modal">
<div class="modal-box">

<h3>Manual Upload</h3>

<input id="title" placeholder="Title">
<input id="cat" placeholder="Category">

<div class="url-row">
<input id="url" placeholder="Video URL">
<button onclick="pasteURL()">📋</button>
<button onclick="clearURL()">❌</button>
</div>

<input id="th" placeholder="Thumbnail URL">

<button onclick="generate()">Generate Code</button>

<div id="codeBox"></div>

<hr>

<h3>Smart Converter</h3>

<textarea id="rawInput"></textarea>

<button onclick="convertEmbed()">
Convert
</button>

<div id="convertOutput"></div>

<button onclick="addConverted()">
Add to Site
</button>

<hr>

<button onclick="closeModal()">
Close
</button>

</div>
</div>

function render(){

grid.innerHTML="";

let start=(currentPage-1)*perPage;
let end=start+perPage;

let pageData=VV.slice(start,end);

pageData.forEach(v=>{

let a=document.createElement("a");

a.href=PL+"?url="+encodeURIComponent(v.url);
a.target="_blank";

a.innerHTML=
`

onmouseenter="playPreview(this)"
onmouseleave="stopPreview(this)">

<img src="${v.th || ''}">

<source src="${v.url}">
</video>

<h3>${v.title}</h3>

</div>
`;

grid.appendChild(a);

});

let totalPages=Math.ceil(VV.length/perPage)||1;

document.getElementById("pageNum").innerText=
"Page "+currentPage+" / "+totalPages;

}

}
}



function playPreview(c){

if(window.innerWidth<768)return;

let v=c.querySelector("video");
let i=c.querySelector("img");

if(!v) return;

v.style.display="block";
v.play().catch(()=>{});
i.style.opacity="0";

}

function stopPreview(c){

let v=c.querySelector("video");
let i=c.querySelector("img");

if(!v) return;

v.pause();
v.style.display="none";
i.style.opacity="1";

}

var convertedData=[];


function convertEmbed(){

let raw=val("rawInput");

if(!raw){
alert("Paste data");
return;
}


/* handles raw objects + mixed pasted data */
let matches=
raw.match(/{[\s\S]*?}/g) || [];

if(!matches.length){

/* fallback: detect bare urls pasted line by line */
let urls=
raw.match(/https?:\/\/[^\s"'<>]+/g)||[];

if(!urls.length){
alert("No valid data");
return;
}

matches=urls.map(u=>`{url:"${u}"}`);

}


convertedData=[];

let output="";

let usedTitles=new Set();
let dupUrls=new Set();


function unique(){

let n;

do{
n=Math.floor(Math.random()*100000);
}
while(usedTitles.has(n));

usedTitles.add(n);

return n;

}


/* universal media detector */
function validVideo(url){

if(!url) return false;

url=url.toLowerCase();

if(
url.includes(".mp4") ||
url.includes(".mov") ||
url.includes(".m3u8") ||
url.includes(".webm") ||
url.includes(".mkv") ||
url.includes(".avi") ||
url.includes(".ts") ||
url.includes("cloudinary.com") ||
url.includes("video/upload") ||
url.includes("stream") ||
url.includes("playlist") ||
url.includes("cdn")
){
return true;
}


/* future formats auto-detect */
try{

let p=new URL(url).pathname;

if(
p.split(".").length>1 ||
url.includes("/video/")
){
return true;
}

}catch(e){}

return false;

}



matches.forEach(str=>{

let url=
(str.match(/url\s*:\s*"([^"]+)"/)||[])[1] ||
(str.match(/url\s*:\s*'([^']+)'/)||[])[1];

if(!validVideo(url)) return;

/* duplicate filter */
if(dupUrls.has(url)) return;
dupUrls.add(url);


let num=unique();

let title="Clip "+num;

let obj={
id:Date.now()+Math.random(),
title:title,
cat:title,
url:url,
th:autoThumb(url)
};

convertedData.push(obj);

output+=
`{id:${obj.id},title:"${obj.title}",cat:"${obj.cat}",url:"${obj.url}",th:"${obj.th}"},

`;

});


if(!convertedData.length){
alert("No supported media found");
return;
}


document.getElementById("convertOutput").innerHTML=
`
<pre id="finalCode">${output}</pre>

<button onclick="copyText('finalCode','convMsg')">
📋 Copy
</button>

<div id="convMsg" class="copy-msg">
Copied ✓
</div>
`;

}



function addConverted(){

convertedData.forEach(v=>VV.unshift(v));

currentPage=1;

render();

}



/* copy helper */
function copyText(id,msg){

let text=
document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

let m=document.getElementById(msg);

m.classList.add("show");

setTimeout(
()=>m.classList.remove("show"),
1200
);

}



/* smarter thumbnail fallback */
function autoThumb(url){

if(!url) return "";


/* cloudinary urls */
if(url.includes("cloudinary")){

return url
.replace(
"/video/upload/",
"/video/upload/c_fill,ar_9:16,g_auto,so_1/"
)
.replace(".mp4",".jpg")
.replace(".mov",".jpg")
.replace(".m3u8",".jpg")
.replace(".webm",".jpg");

}


/* streams fallback */
if(
url.includes(".m3u8") ||
url.includes("stream") ||
url.includes("playlist")
){
return "https://via.placeholder.com/400x700?text=Stream";
}


/* CDN no extension fallback */
return url;

}
