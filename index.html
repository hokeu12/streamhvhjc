<!DOCTYPE html>

<title>StreamHub</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

.card{
  background:#151522;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  padding:10px;
  font-size:14px;
}

/* UPLOAD MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.modal input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
}

#codeBox{
  background:#000;
  padding:10px;
  font-size:12px;
  word-break:break-all;
  margin-top:10px;
}
</style>
</head>

    <input id="url" placeholder="Video URL">

    <button onclick="generate()">Generate Code</button>

/* RENDER */
function render(){
  var grid=document.getElementById("grid");
  grid.innerHTML="";
  VV.forEach(v=>{
    var a=document.createElement("a");
    a.href=PL+"?url="+encodeURIComponent(v.url);
    a.target="_blank";

    a.innerHTML=`
      <div class="card">
        ${v.th ? `<img src="${v.th}">` : `<div style="height:160px;background:#222"></div>`}
        <h3>${v.title}</h3>
      </div>
    `;
    grid.appendChild(a);
  });
}
render();

/* MODAL */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

/* GENERATE CODE */
function generate(){
  var t=document.getElementById("title").value;
  var c=document.getElementById("cat").value;
  var u=document.getElementById("url").value;
  var th=document.getElementById("th").value;

  var id=Date.now();

  var code=`{id:${id},title:"${t}",cat:"${c}",url:"${u}",th:"${th}"},`;

  document.getElementById("codeBox").innerText=code;
}
