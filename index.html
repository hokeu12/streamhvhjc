<!DOCTYPE html>

<html>
<head>
  <title>MyStream</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 15px 30px;
      font-size: 24px;
      background: #111;
    }

    #search {
      width: 200px;
      padding: 5px;
      margin-left: 20px;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .title {
      font-size: 14px;
      margin-top: 5px;
    }
  </style>

</head>

<body>

<header>
  🔥 MyStream
  <input type="text" id="search" placeholder="Search..." onkeyup="searchVideos()">
</header>

<div id="gallery"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allVideos = [];

function displayVideos(videos) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  videos.forEach(v => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${v.thumbnail}">
      <div class="title">${v.title}</div>
      <div>👁 ${v.views || 0} ❤️ ${v.likes || 0}</div>
    `;

    card.onclick = () => {
      increaseViews(v.id, v.views || 0);
      window.location.href = "player.html?v=" + v.url + "&id=" + v.id;
    };

    gallery.appendChild(card);
  });
}

function searchVideos() {
  const term = document.getElementById("search").value.toLowerCase();
  const filtered = allVideos.filter(v =>
    v.title.toLowerCase().includes(term)
  );
  displayVideos(filtered);
}

function increaseViews(id, views) {
  db.collection("videos").doc(id).update({
    views: views + 1
  });
}

db.collection("videos")
.orderBy("createdAt", "desc")
.get()
.then(snapshot => {
  snapshot.forEach(doc => {
    allVideos.push({ id: doc.id, ...doc.data() });
  });
  displayVideos(allVideos);
});
</script>

</body>
</html>
