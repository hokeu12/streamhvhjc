<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
  padding-bottom:90px;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}
button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:20px;
}
@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}
.card{
  position:relative;
  background:#151522;
  border-radius:10px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}
.card video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:160px;
  object-fit:cover;
  display:none;
}
.card h3{
  padding:8px;
  font-size:13px;
  margin:0;
}

/* PAGINATION */
.pagination{
  text-align:center;
  margin-bottom:20px;
}
.pagination button{
  margin:5px;
}

/* URL INPUT ROW */
.url-row{
  display:flex;
  gap:5px;
}
.url-row input{
  flex:1;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:360px;
  max-height:90vh;
  overflow:auto;
}
.modal input, textarea{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
}

/* COPY */
.copy-msg{
  font-size:12px;
  color:#4caf50;
  opacity:0;
  transition:.4s;
}
.copy-msg.show{opacity:1;}

.bottom-ad{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  background:#000;
  z-index:9999;
}
</style>
</head>

<body>

<div class="top">
  <h2>StreamHub</h2>
  <button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<!-- PAGINATION -->
<div class="pagination">
  <button onclick="prevPage()">⬅ Prev</button>
  <span id="pageNum"></span>
  <button onclick="nextPage()">Next ➡</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Manual Upload</h3>
<input id="title" placeholder="Title">
<input id="cat" placeholder="Category">

<!-- 🔥 UPDATED URL INPUT -->
<div class="url-row">
  <input id="url" placeholder="Video URL">
  <button onclick="pasteURL()">📋</button>
  <button onclick="clearURL()">❌</button>
</div>

<input id="th" placeholder="Thumbnail URL">

<button onclick="generate()">Generate Code</button>
<div id="codeBox"></div>

<hr>

<h3>Smart Converter</h3>
<textarea id="rawInput"></textarea>
<button onclick="convertEmbed()">Convert</button>

<div id="convertOutput"></div>
<button onclick="addConverted()">Add to Site</button>

<hr>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

var PL="player.html";

/* PAGINATION */
var currentPage=1;
var perPage=16;

/* VIDEO DATA */
var VV=[];

/* RENDER */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

let start=(currentPage-1)*perPage;
let end=start+perPage;

let pageData=VV.slice(start,end);

pageData.forEach(v=>{
let a=document.createElement("a");
a.href=PL+"?url="+encodeURIComponent(v.url);
a.target="_blank";

a.innerHTML=`
<div class="card" onmouseenter="playPreview(this)" onmouseleave="stopPreview(this)">
<img src="${v.th}">
<video muted loop><source src="${v.url}"></video>
<h3>${v.title}</h3>
</div>`;
grid.appendChild(a);
});

let totalPages=Math.ceil(VV.length/perPage)||1;
document.getElementById("pageNum").innerText="Page "+currentPage+" / "+totalPages;
}

/* PAGINATION */
function nextPage(){
if(currentPage < Math.ceil(VV.length/perPage)){
currentPage++;
render();
}
}
function prevPage(){
if(currentPage>1){
currentPage--;
render();
}
}

/* PREVIEW */
function playPreview(c){
if(window.innerWidth<768)return;
let v=c.querySelector("video"),i=c.querySelector("img");
v.style.display="block";v.play();i.style.opacity="0";
}
function stopPreview(c){
let v=c.querySelector("video"),i=c.querySelector("img");
v.pause();v.style.display="none";i.style.opacity="1";
}

/* 🔥 PASTE + CLEAR */
async function pasteURL(){
try{
let text=await navigator.clipboard.readText();
document.getElementById("url").value=text;
}catch{
alert("Clipboard blocked");
}
}
function clearURL(){
document.getElementById("url").value="";
}

/* MANUAL UPLOAD */
function generate(){

let t=val("title")||"Untitled";
let c=val("cat")||"General";
let u=val("url");

if(!u){alert("Enter video URL");return;}

let th=val("th")||autoThumb(u);
let id=Date.now();

let obj={id,title:t,cat:c,url:u,th};

let code=`{id:${id},title:"${t}",cat:"${c}",url:"${u}",th:"${th}"},`;

document.getElementById("codeBox").innerHTML=`
<pre id="embedText">${code}</pre>
<button onclick="copyText('embedText','manualMsg')">📋 Copy</button>
<div id="manualMsg" class="copy-msg">Copied ✓</div>
`;

VV.unshift(obj);
currentPage=1;
render();
}

/* SMART CONVERTER */
var convertedData=[];

function convertEmbed(){

let raw=val("rawInput");
if(!raw){alert("Paste data");return;}

let matches=raw.match(/{[\s\S]*?}/g);
if(!matches){alert("No valid data");return;}

convertedData=[];
let output="";
let used=new Set();

function unique(){
let n;
do{ n=Math.floor(Math.random()*100000); }
while(used.has(n));
used.add(n);
return n;
}

matches.forEach(str=>{
let url=(str.match(/url\s*:\s*"([^"]+)"/)||[])[1];
if(!url || !url.includes(".mp4")) return;

let num=unique();
let title="Clip "+num;

let obj={
id:Date.now()+Math.random(),
title:title,
cat:title,
url:url,
th:autoThumb(url)
};

convertedData.push(obj);

output+=`{id:${obj.id},title:"${obj.title}",cat:"${obj.cat}",url:"${obj.url}",th:"${obj.th}"},\n\n`;
});

document.getElementById("convertOutput").innerHTML=`
<pre id="finalCode">${output}</pre>
<button onclick="copyText('finalCode','convMsg')">📋 Copy</button>
<div id="convMsg" class="copy-msg">Copied ✓</div>
`;
}

/* ADD */
function addConverted(){
convertedData.forEach(v=>VV.unshift(v));
currentPage=1;
render();
}

/* COPY */
function copyText(id,msgId){
let text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
let m=document.getElementById(msgId);
m.classList.add("show");
setTimeout(()=>m.classList.remove("show"),1200);
}

/* HELPERS */
function autoThumb(url){
if(!url.includes("cloudinary")) return "";
return url.replace("/video/upload/","/video/upload/c_fill,ar_9:16,g_auto,so_1/")
.replace(".mp4",".jpg");
}
function val(id){return document.getElementById(id).value;}

/* MODAL */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

/* INIT */
render();

</script>

<!-- AD -->
<div class="bottom-ad">
<script>
atOptions={
key:"3407cae831ba7308f892ce3e722d876e",
format:"iframe",
height:50,
width:320
};
</script>
<script src="https://www.highperformanceformat.com/3407cae831ba7308f892ce3e722d876e/invoke.js"></script>
</div>

</body>
</html>
