<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* GRID (4 per row desktop) */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:20px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{
  position:relative;
  background:#151522;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
}

.card video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:160px;
  object-fit:cover;
  display:none;
}

/* TITLE */
.card h3{
  padding:8px;
  font-size:13px;
  margin:0;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:320px;
}

.modal input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
}

#codeBox{
  background:#000;
  padding:10px;
  font-size:12px;
  word-break:break-all;
}
</style>
</head>

/* =========================
   RENDER SYSTEM
========================= */
function render(){
  var grid=document.getElementById("grid");
  grid.innerHTML="";

  VV.forEach(v=>{
    var a=document.createElement("a");
    a.href=PL+"?url="+encodeURIComponent(v.url);
    a.target="_blank";

    a.innerHTML=`
      <div class="card"
        onmouseenter="playPreview(this)"
        onmouseleave="stopPreview(this)">

        <img src="${v.th}" loading="lazy">

        <video muted loop preload="none">
          <source src="${v.url}">
        </video>

        <h3>${v.title}</h3>
      </div>
    `;

    grid.appendChild(a);
  });
}
render();

/* =========================
   HOVER PREVIEW (desktop)
========================= */
function playPreview(card){
  if(window.innerWidth < 768) return;

  let video=card.querySelector("video");
  let img=card.querySelector("img");

  video.style.display="block";
  video.currentTime=2;
  video.play();

  img.style.opacity="0";
}

function stopPreview(card){
  if(window.innerWidth < 768) return;

  let video=card.querySelector("video");
  let img=card.querySelector("img");

  video.pause();
  video.style.display="none";
  img.style.opacity="1";
}

/* =========================
   OLD EMBED UPLOAD SYSTEM
========================= */
function generate(){

  var t=document.getElementById("title").value;
  var c=document.getElementById("cat").value;
  var u=document.getElementById("url").value;
  var th=document.getElementById("th").value;

  var id=Date.now();

  var code = `{id:${id},title:"${t}",cat:"${c}",url:"${u}",th:"${th}"},`;

  document.getElementById("codeBox").innerText = code;

  // ALSO ADD LIVE (optional but useful)
  VV.unshift({
    id:id,
    title:t,
    cat:c,
    url:u,
    th:th
  });

  render();
}

/* MODAL */
