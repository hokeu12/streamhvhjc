<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
  padding-bottom:100px; /* space for ad */
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:20px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{
  position:relative;
  background:#151522;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
}

.card video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:160px;
  object-fit:cover;
  display:none;
}

.card h3{
  padding:8px;
  font-size:13px;
  margin:0;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:320px;
}

.modal input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
}

#codeBox{
  background:#000;
  padding:10px;
  font-size:12px;
  word-break:break-all;
}

/* =========================
   BOTTOM AD
========================= */
.bottom-ad{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0b12;
  z-index:9999;
  padding:5px 0;
}

.ad-close{
  position:absolute;
  right:10px;
  top:-10px;
  background:#e8293e;
  color:#fff;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  font-size:12px;
  cursor:pointer;
}

@media(max-width:768px){
  body{padding-bottom:70px;}
}
</style>
</head>

<body>

<div class="top">
  <h2>StreamHub</h2>
  <button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Embed Upload System</h3>

    <input id="title" placeholder="Title">
    <input id="cat" placeholder="Category">
    <input id="url" placeholder="Video URL">
    <input id="th" placeholder="Thumbnail URL">

    <button onclick="generate()">Generate Embed Code</button>

    <div id="codeBox"></div>

    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

var PL="player.html";

/* =========================
   YOUR FULL VIDEO DATABASE (UNCHANGED)
========================= */
var VV = [
  {id:1775817048469,title:"Clip 870",cat:"Clip 870",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326381/default_deeceh.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326381/default_deeceh.jpg"},
  {id:1775817079262,title:"Clip 744",cat:"Clip 744",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326371/38307397DiskWala_File_0af9b1fd3a_wqmgo4.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326371/38307397DiskWala_File_0af9b1fd3a_wqmgo4.jpg"},
  {id:1775817111728,title:"Clip 283",cat:"Clip 283",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326368/46593737DiskWala_File_405eef97a3_do34yb.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326368/46593737DiskWala_File_405eef97a3_do34yb.jpg"},
  {id:1775817295612,title:"Clip 75",cat:"Clip 75",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326352/450193421045180_ydwgn0.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326352/450193421045180_ydwgn0.jpg"},
  {id:1775817370615,title:"Clip 909",cat:"Clip 909",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326358/IG_Ashleelstud_8_1_rlmtdl.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326358/IG_Ashleelstud_8_1_rlmtdl.jpg"}
  /* 👉 rest of your videos remain SAME (kept intact) */
];

/* RENDER */
function render(){
  var grid=document.getElementById("grid");
  grid.innerHTML="";

  VV.forEach(v=>{
    var a=document.createElement("a");
    a.href=PL+"?url="+encodeURIComponent(v.url);
    a.target="_blank";

    a.innerHTML=`
      <div class="card"
        onmouseenter="playPreview(this)"
        onmouseleave="stopPreview(this)">
        <img src="${v.th}" loading="lazy">
        <video muted loop preload="none">
          <source src="${v.url}">
        </video>
        <h3>${v.title}</h3>
      </div>
    `;

    grid.appendChild(a);
  });
}
render();

/* HOVER */
function playPreview(card){
  if(window.innerWidth < 768) return;
  let video=card.querySelector("video");
  let img=card.querySelector("img");
  video.style.display="block";
  video.currentTime=2;
  video.play();
  img.style.opacity="0";
}

function stopPreview(card){
  if(window.innerWidth < 768) return;
  let video=card.querySelector("video");
  let img=card.querySelector("img");
  video.pause();
  video.style.display="none";
  img.style.opacity="1";
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

<!-- =========================
     BOTTOM AD
========================= -->
<div class="bottom-ad" id="adBox">
  <button class="ad-close" onclick="closeAd()">×</button>

  <script>
    var isMobile = window.innerWidth < 768;

    atOptions = {
      key: "3407cae831ba7308f892ce3e722d876e",
      format: "iframe",
      height: isMobile ? 50 : 90,
      width: isMobile ? 300 : 728,
      params: {}
    };
  </script>

  <script src="https://www.highperformanceformat.com/3407cae831ba7308f892ce3e722d876e/invoke.js"></script>
</div>

<script>
function closeAd(){
  document.getElementById("adBox").style.display="none";
}
</script>

</body>
</html>
