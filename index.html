<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0b12;color:#fff;padding-bottom:90px;}
.top{display:flex;justify-content:space-between;padding:15px;}
button{background:#e8293e;border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
.card{position:relative;background:#151522;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:160px;object-fit:cover;}
.card video{position:absolute;top:0;width:100%;height:160px;object-fit:cover;display:none;}
.card h3{padding:8px;font-size:13px;margin:0;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;}
.modal-box{background:#111;padding:20px;border-radius:10px;width:360px;max-height:90vh;overflow:auto;}
.modal input, textarea{width:100%;margin-bottom:10px;padding:8px;border:none;}
.copy-msg{font-size:12px;color:#4caf50;opacity:0;transition:.4s;}
.copy-msg.show{opacity:1;}
.bottom-ad{position:fixed;bottom:0;width:100%;display:flex;justify-content:center;background:#000;z-index:9999;}
</style>
</head>

<body>

<div class="top">
  <h2>StreamHub</h2>
  <button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Smart Converter (FIXED)</h3>
<textarea id="rawInput" placeholder="Paste objects here..."></textarea>

<button onclick="convertEmbed()">Convert</button>

<div id="convertOutput"></div>

<button onclick="addConverted()">Add to Site</button>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

var PL="player.html";

/* VIDEO DATA */
var VV=[
{id:1775817048469,title:"Clip 870",cat:"Clip 870",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326381/default_deeceh.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326381/default_deeceh.jpg"},
{id:1775817079262,title:"Clip 744",cat:"Clip 744",url:"https://res.cloudinary.com/dabgszxqm/video/upload/v1775326371/38307397DiskWala_File_0af9b1fd3a_wqmgo4.mp4",th:"https://res.cloudinary.com/dabgszxqm/video/upload/c_fill,ar_9:16,g_auto,so_1/v1775326371/38307397DiskWala_File_0af9b1fd3a_wqmgo4.jpg"}
];

/* RENDER */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";
VV.forEach(v=>{
let a=document.createElement("a");
a.href=PL+"?url="+encodeURIComponent(v.url);
a.target="_blank";
a.innerHTML=`
<div class="card" onmouseenter="playPreview(this)" onmouseleave="stopPreview(this)">
<img src="${v.th}">
<video muted loop><source src="${v.url}"></video>
<h3>${v.title}</h3>
</div>`;
grid.appendChild(a);
});
}
render();

/* PREVIEW */
function playPreview(c){
if(window.innerWidth<768)return;
let v=c.querySelector("video"),i=c.querySelector("img");
v.style.display="block";v.play();i.style.opacity="0";
}
function stopPreview(c){
let v=c.querySelector("video"),i=c.querySelector("img");
v.pause();v.style.display="none";i.style.opacity="1";
}

/* SMART CONVERTER (FINAL FIX) */
var convertedData=[];

function convertEmbed(){

let raw=document.getElementById("rawInput").value;
if(!raw) return;

convertedData=[];
let matches = raw.match(/{[\s\S]*?}/g);
if(!matches) return;

let finalCode="";

matches.forEach((str,i)=>{

let url=(str.match(/url\s*:\s*"([^"]+)"/)||[])[1]||"";
url=url.trim();

if(!url.includes(".mp4")) return; // skip invalid

let title=(str.match(/title\s*:\s*"([^"]+)"/)||[])[1]||("Clip "+(i+1));
let cat=(str.match(/cat\s*:\s*"([^"]+)"/)||[])[1]||title;

let th = autoThumb(url);

let obj={
id:Date.now()+Math.random(),
title:title,
cat:cat,
url:url,
th:th
};

convertedData.push(obj);

/* OUTPUT FORMAT EXACT */
finalCode += `{ id:${obj.id},title:"${obj.title}",cat:"${obj.cat}",
url:"${obj.url}",
th:"${obj.th}"
},\n\n`;

});

document.getElementById("convertOutput").innerHTML=`
<pre id="finalCode">${finalCode}</pre>
<button onclick="copyText('finalCode','msg')">📋 Copy</button>
<div id="msg" class="copy-msg">Copied ✓</div>
`;

}

/* ADD */
function addConverted(){
convertedData.forEach(v=>VV.unshift(v));
render();
}

/* COPY */
function copyText(id,msgId){
let text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
let m=document.getElementById(msgId);
m.classList.add("show");
setTimeout(()=>m.classList.remove("show"),1200);
}

/* AUTO THUMB FIX */
function autoThumb(url){
if(!url.includes("cloudinary")) return "";
return url.replace("/video/upload/","/video/upload/c_fill,ar_9:16,g_auto,so_1/")
.replace(".mp4",".jpg");
}

/* MODAL */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

</script>

<!-- BOTTOM AD (YOUR ORIGINAL) -->
<div class="bottom-ad">
<script>
atOptions={
key:"3407cae831ba7308f892ce3e722d876e",
format:"iframe",
height:50,
width:320
};
</script>
<script src="https://www.highperformanceformat.com/3407cae831ba7308f892ce3e722d876e/invoke.js"></script>
</div>

</body>
</html>
