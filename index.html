<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="StreamHub — Free video streaming, watch online"/>
<title>StreamHub — Watch Free Videos Online</title>

<style>
/* KEEPING YOUR ORIGINAL CSS */
</style>

<!-- ❌ REMOVED POPUNDER SCRIPT -->

</head>
<body>

<nav id="nav">
  <div class="logo" onclick="goHome()">StreamHub</div>
  <div class="sw">
    <input id="si" type="text" placeholder="Search videos..." oninput="doSearch(this.value)"/>
  </div>
</nav>

<div id="hero">
  <div class="hero-title">Watch <span>Free Videos</span> Online</div>
</div>

<!-- ✅ ONLY AD LEFT -->
<div class="ad-zone" id="top-ad">
  <span class="ad-tag">Advertisement</span>
  <script>
    atOptions = {
      key: '3407cae831ba7308f892ce3e722d876e',
      format: 'iframe',
      height: 90,
      width: 728,
      params: {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/3407cae831ba7308f892ce3e722d876e/invoke.js"></script>
</div>

<main id="page">
  <div id="allv">
    <div class="slabel">
      <h2 id="page-title">All Videos</h2>
      <span id="vcnt">0</span>
    </div>
    <div id="vcontainer"></div>
  </div>
</main>

<!-- ❌ REMOVED ALL ad-slot-* BLOCKS -->

<script>
var PL = 'https://yummycorn.netlify.app/player.html';

var VV = [
  {id:1,title:"Big Buck Bunny",cat:"Movies",dur:"9:56",q:"HD",vw:24000,
   url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
   th:"https://peach.blender.org/wp-content/uploads/bbb-splash.png"}
];

var AC='All';

document.addEventListener('DOMContentLoaded',function(){
  renderAll();
});

function renderAll(){
  var vids = AC==='All'?VV:VV.filter(v=>v.cat===AC);
  var container=document.getElementById('vcontainer');
  container.innerHTML='';

  var grid=document.createElement('div');
  grid.className='vgrid';
  container.appendChild(grid);

  vids.forEach(function(v,i){
    grid.appendChild(mkCard(v,i));
  });
}

function mkCard(v,i){
  var a=document.createElement('a');
  a.className='vc';
  a.href=PL+'?id='+v.id;
  a.target='_blank';

  a.innerHTML = `
    <div class="vth">
      <img src="${v.th}">
    </div>
    <div class="vbody">
      <div class="vtitle">${v.title}</div>
    </div>
  `;
  return a;
}

function doSearch(q){
  var val=q.toLowerCase();
  var hits=VV.filter(v=>v.title.toLowerCase().includes(val));
  var grid=document.getElementById('vcontainer');
  grid.innerHTML='';
  hits.forEach(v=>grid.appendChild(mkCard(v)));
}

function goHome(){
  renderAll();
}
</script>

</body>
</html>
