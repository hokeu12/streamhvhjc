<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

.card{
  background:#151522;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  padding:10px;
  font-size:14px;
}

</style>
</head>

<body>

<!-- ✅ TOP BANNER AD ONLY -->
<script src="https://pl28997809.profitablecpmratenetwork.com/b8/7d/81/b87d8149540da4612ff212f58c224f74.js"></script>

<h2 style="padding:15px">StreamHub Videos</h2>

<div class="grid" id="grid"></div>

<script>
var PL = "player.html";

/* ✅ FIXED ARRAY */
var VV = [

{id:1,title:"Big Buck Bunny",cat:"Movies",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
th:"https://peach.blender.org/wp-content/uploads/bbb-splash.png"},

{id:2,title:"Elephant Dream",cat:"Movies",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
th:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Elephants_Dream_s5_both.jpg/640px-Elephants_Dream_s5_both.jpg"},

{id:3,title:"Tears of Steel",cat:"Action",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4",
th:""},

{id:4,title:"Web Dev Course",cat:"Education",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4",
th:""},

{id:5,title:"Travel Vlog",cat:"Travel",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/VolkswagenGTIReview.mp4",
th:""},

{id:6,title:"Comedy Clips",cat:"Comedy",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCarCanYouGetForAGrand.mp4",
th:""},

{id:7,title:"Sports Reel",cat:"Sports",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
th:""},

{id:8,title:"Cooking Pasta",cat:"Cooking",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
th:""},

{id:9,title:"Gaming PC Build",cat:"Gaming",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
th:""},

{id:10,title:"Tokyo Travel",cat:"Travel",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
th:""},

{id:11,title:"Comedy Sketches",cat:"Comedy",
url:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
th:""}
];

/* ✅ RENDER */
var grid = document.getElementById("grid");

VV.forEach(v=>{
  var a=document.createElement("a");
  a.href=PL+"?url="+encodeURIComponent(v.url);
  a.target="_blank";

  var th = v.th
    ? `<img src="${v.th}" onerror="this.style.display='none'">`
    : `<div style="height:160px;background:#222"></div>`;

  a.innerHTML=`
    <div class="card">
      ${th}
      <h3>${v.title}</h3>
    </div>
  `;

  grid.appendChild(a);
});
</script>

</body>
</html>
