<style>

  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{
  background:#151522;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
}

.card video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:160px;
  object-fit:cover;
  display:none;
}

.card h3{
  padding:8px;
  font-size:14px;
  margin:0;
}

.meta{
  padding:0 8px 10px;
  font-size:12px;
  color:#aaa;
}

#loader{
  text-align:center;
  padding:20px;
  color:#888;
}
</style>
</head>

/* =========================
   VIEW SYSTEM
========================= */

function addView(id){
  let v = JSON.parse(localStorage.getItem("views") || "{}");
  v[id] = (v[id] || 0) + 1;
  localStorage.setItem("views", JSON.stringify(v));
}

/* =========================
   TRENDING ALGO
========================= */

function getTrend(v){
  let views = JSON.parse(localStorage.getItem("views") || "{}")[v.id] || 0;
  let age = (Date.now() - v.createdAt) / 3600000;
  return (views * 10) + (1000 / (age + 2));
}

VV.sort((a,b)=>getTrend(b)-getTrend(a));

/* =========================
   INFINITE SCROLL
========================= */

let index = 0;
let batch = 6;
let grid = document.getElementById("grid");

function loadMore(){
  let slice = VV.slice(index, index + batch);

  slice.forEach(renderCard);

  index += batch;

  if(index >= VV.length){
    document.getElementById("loader").innerText = "No more videos";
  }
}

/* =========================
   RENDER CARD
========================= */

function renderCard(v){
  let a = document.createElement("a");
  a.href = PL + "?url=" + encodeURIComponent(v.url);

  a.onclick = () => addView(v.id);

  let views = JSON.parse(localStorage.getItem("views") || "{}")[v.id] || 0;

  a.innerHTML = `
    <div class="card"
      onmouseenter="playPreview(this)"
      onmouseleave="stopPreview(this)">

      <img src="${v.th}" loading="lazy">

      <video muted loop preload="none">
        <source src="${v.url}">
      </video>

      <h3>${v.title}</h3>

      <div class="meta">
        👀 ${views} views • 🔥 Trending
      </div>
    </div>
  `;

  grid.appendChild(a);
}

/* =========================
   PREVIEW SYSTEM
========================= */

function playPreview(card){
  if(window.innerWidth < 768) return;

  let video = card.querySelector("video");
  video.style.display = "block";
  video.currentTime = 1;
  video.play();
}

function stopPreview(card){
  let video = card.querySelector("video");
  video.pause();
  video.style.display = "none";
}

/* =========================
   SCROLL LOAD
========================= */

window.addEventListener("scroll",()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 300){
    loadMore();
  }
});

/* INIT */
loadMore();
