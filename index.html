<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0b12;color:#fff;padding-bottom:90px;}
.top{display:flex;justify-content:space-between;align-items:center;padding:15px;}
button{background:#e8293e;border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
.card{position:relative;background:#151522;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:160px;object-fit:cover;}
.card video{position:absolute;top:0;width:100%;height:160px;object-fit:cover;display:none;}
.card h3{padding:8px;font-size:13px;margin:0;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;}
.modal-box{background:#111;padding:20px;border-radius:10px;width:360px;max-height:90vh;overflow:auto;}
input,textarea{width:100%;margin-bottom:10px;padding:8px;border:none;}
.copy-msg{font-size:12px;color:#4caf50;opacity:0;transition:.4s;}
.copy-msg.show{opacity:1;}
.bottom-ad{position:fixed;bottom:0;width:100%;display:flex;justify-content:center;background:#000;}
</style>
</head>

<body>

<div class="top">
<h2>StreamHub</h2>
<button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modal-box">

<h3>Smart Converter (ULTIMATE FIXED)</h3>

<textarea id="rawInput" placeholder="Paste anything: JS objects, JSON, arrays, messy data..."></textarea>

<button onclick="convertEmbed()">Convert</button>

<div id="convertOutput"></div>

<button onclick="addConverted()">Add to Site</button>

<hr>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

var PL="player.html";
var VV=[];
var convertedData=[];

/* ---------------- RENDER ---------------- */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

VV.forEach(v=>{
let a=document.createElement("a");
a.href=PL+"?url="+encodeURIComponent(v.url);
a.target="_blank";

a.innerHTML=`
<div class="card" onmouseenter="playPreview(this)" onmouseleave="stopPreview(this)">
<img src="${v.th}">
<video muted loop><source src="${v.url}"></video>
<h3>${v.title}</h3>
</div>`;

grid.appendChild(a);
});
}
render();

/* ---------------- PREVIEW ---------------- */
function playPreview(c){
if(window.innerWidth<768)return;
let v=c.querySelector("video"),i=c.querySelector("img");
v.style.display="block";v.play();i.style.opacity="0";
}
function stopPreview(c){
let v=c.querySelector("video"),i=c.querySelector("img");
v.pause();v.style.display="none";i.style.opacity="1";
}

/* ---------------- HELPERS ---------------- */
function val(id){return document.getElementById(id).value;}

function autoThumb(url){
if(!url) return "";
if(!url.includes("cloudinary")) return "";
return url
.replace("/video/upload/","/video/upload/c_fill,ar_9:16,g_auto,so_1/")
.replace(".mp4",".jpg");
}

/* ---------------- FIXER (CORE ENGINE) ---------------- */
function fixJSLikeObject(str){

return str
// single → double quotes
.replace(/'/g,'"')

// quote keys
.replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g,'$1"$2":')

// remove trailing commas
.replace(/,\s*}/g,'}')
.replace(/,\s*]/g,']')

.trim();
}

/* ---------------- SMART EXTRACTOR ---------------- */
function extractBlocks(raw){

// try JSON first
try{
let parsed = JSON.parse(raw);
if(Array.isArray(parsed)) return parsed;
if(typeof parsed === "object") return [parsed];
}catch(e){}

// fallback: grab objects
let matches = raw.match(/{[\s\S]*?}/g);
if(!matches) return [];

return matches;
}

/* ---------------- MAIN CONVERTER ---------------- */
function convertEmbed(){

let raw = val("rawInput");
convertedData = [];
let output = "";

let blocks = extractBlocks(raw);

if(blocks.length === 0){
document.getElementById("convertOutput").innerHTML =
`<pre>No valid data found ❌</pre>`;
return;
}

blocks.forEach((b,i)=>{

try{

let fixed = fixJSLikeObject(b);
let obj = JSON.parse(fixed);

if(!obj.url || !obj.url.includes(".mp4")) return;

let finalObj = {
id: Date.now() + Math.random(),
title: obj.title || ("Clip "+(i+1)),
cat: obj.cat || obj.title || "",
url: obj.url,
th: obj.th || autoThumb(obj.url)
};

convertedData.push(finalObj);

output += `{ id:${finalObj.id},title:"${finalObj.title}",cat:"${finalObj.cat}",url:"${finalObj.url}",th:"${finalObj.th}" },\n\n`;

}catch(e){
// ignore broken blocks
}

});

document.getElementById("convertOutput").innerHTML =
`<pre id="finalCode">${output || "No valid MP4 found"}</pre>
<button onclick="copyText('finalCode','convMsg')">📋 Copy</button>
<div id="convMsg" class="copy-msg">Copied ✓</div>`;
}

/* ---------------- APPLY ---------------- */
function addConverted(){
convertedData.forEach(v=>VV.unshift(v));
render();
}

/* ---------------- COPY ---------------- */
function copyText(id,msgId){
let el=document.getElementById(id);
navigator.clipboard.writeText(el.innerText||el.value);

let m=document.getElementById(msgId);
m.classList.add("show");
setTimeout(()=>m.classList.remove("show"),1200);
}

/* ---------------- MODAL ---------------- */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

</script>

</body>
</html>
