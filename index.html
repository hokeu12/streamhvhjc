<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StreamHub</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b12;
  color:#fff;
  padding-bottom:90px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

button{
  background:#e8293e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:20px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

.card{
  position:relative;
  background:#151522;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:160px;
  object-fit:cover;
  display:none;
}

.card h3{
  padding:8px;
  font-size:13px;
  margin:0;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:360px;
  max-height:90vh;
  overflow:auto;
}

.modal input, textarea{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border:none;
}

.copy-msg{
  font-size:12px;
  color:#4caf50;
  opacity:0;
  transition:opacity .4s;
}
.copy-msg.show{opacity:1;}

.bottom-ad{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  background:#000;
  z-index:9999;
}
</style>
</head>

<body>

<div class="top">
  <h2>StreamHub</h2>
  <button onclick="openModal()">+ Upload</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-box">

    <h3>Manual Upload</h3>

    <input id="title" placeholder="Title">
    <input id="cat" placeholder="Category">
    <input id="url" placeholder="Video URL">
    <input id="th" placeholder="Thumbnail URL">

    <button onclick="generate()">Generate Code</button>

    <div id="codeBox"></div>

    <hr>

    <h3>Smart Converter (FIXED)</h3>
    <textarea id="rawInput" placeholder="Paste ANY messy objects..."></textarea>

    <button onclick="convertEmbed()">Convert</button>

    <div id="convertOutput"></div>

    <button onclick="addConverted()">Add to Site</button>

    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

var PL="player.html";

/* VIDEO DATA */
var VV=[];

/* RENDER */
function render(){
  var grid=document.getElementById("grid");
  grid.innerHTML="";
  VV.forEach(v=>{
    var a=document.createElement("a");
    a.href=PL+"?url="+encodeURIComponent(v.url);
    a.target="_blank";

    a.innerHTML=`
      <div class="card"
        onmouseenter="playPreview(this)"
        onmouseleave="stopPreview(this)">
        <img src="${v.th}">
        <video muted loop><source src="${v.url}"></video>
        <h3>${v.title}</h3>
      </div>
    `;
    grid.appendChild(a);
  });
}
render();

/* PREVIEW */
function playPreview(card){
  if(window.innerWidth<768)return;
  let v=card.querySelector("video");
  let i=card.querySelector("img");
  v.style.display="block"; v.play(); i.style.opacity="0";
}
function stopPreview(card){
  let v=card.querySelector("video");
  let i=card.querySelector("img");
  v.pause(); v.style.display="none"; i.style.opacity="1";
}

/* MANUAL (UNCHANGED) */
function generate(){
  var t=val("title");
  var c=val("cat");
  var u=val("url");
  var th=val("th");

  var id=Date.now();

  var code=`{id:${id},title:"${t}",cat:"${c}",url:"${u}",th:"${th}"},`;

  document.getElementById("codeBox").innerHTML=`
    <div id="embedText">${code}</div>
    <button onclick="copyText('embedText','manualMsg')">📋 Copy</button>
    <div id="manualMsg" class="copy-msg">Copied ✓</div>
  `;

  VV.unshift({id:id,title:t,cat:c,url:u,th:th});
  render();
}

/* 🔥 SMART CONVERTER FINAL FIX */
var convertedData=[];

function convertEmbed(){

  var raw=val("rawInput");
  if(!raw){
    alert("Paste something bro");
    return;
  }

  convertedData=[];

  // CLEAN INPUT (handles trailing commas, brackets etc)
  raw = raw.replace(/,\s*]/g,"]");
  raw = raw.replace(/,\s*}/g,"}");

  var matches = raw.match(/{[\s\S]*?}/g);

  if(!matches){
    document.getElementById("convertOutput").innerHTML="❌ No valid data found";
    return;
  }

  var output="";

  matches.forEach((str,i)=>{

    var url=(str.match(/url\s*:\s*["']([^"']+)["']/)||[])[1]||"";

    if(!url || !url.includes(".mp4")) return;

    var title=(str.match(/title\s*:\s*["']([^"']*)["']/)||[])[1]||("Clip "+(i+1));
    var cat=(str.match(/cat\s*:\s*["']([^"']*)["']/)||[])[1]||title;

    var th=(str.match(/th\s*:\s*["']([^"']+)["']/)||[])[1]||autoThumb(url);

    var obj={
      id:Date.now()+Math.random(),
      title:title,
      cat:cat,
      url:url,
      th:th
    };

    convertedData.push(obj);

    // ✅ OUTPUT VALID JS OBJECT LITERAL
    output+=`{id:${obj.id},title:"${obj.title}",cat:"${obj.cat}",url:"${obj.url}",th:"${obj.th}"},\n`;
  });

  if(!output){
    document.getElementById("convertOutput").innerHTML="❌ No valid mp4 found";
    return;
  }

  document.getElementById("convertOutput").innerHTML=`
    <pre id="finalCode">${output}</pre>
    <button onclick="copyText('finalCode','convMsg')">📋 Copy</button>
    <div id="convMsg" class="copy-msg">Copied ✓</div>
  `;
}

/* ADD */
function addConverted(){
  convertedData.forEach(v=>VV.unshift(v));
  render();
}

/* COPY */
function copyText(id,msgId){
  var text=document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  var m=document.getElementById(msgId);
  m.classList.add("show");
  setTimeout(()=>m.classList.remove("show"),1200);
}

/* HELPERS */
function autoThumb(url){
  if(!url.includes("cloudinary")) return "";
  return url.replace("/video/upload/","/video/upload/c_fill,ar_9:16,g_auto,so_1/")
            .replace(".mp4",".jpg");
}
function val(id){return document.getElementById(id).value;}

/* MODAL */
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

</script>

</body>
</html>
